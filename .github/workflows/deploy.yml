name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Replace configuration placeholders
        run: |
          python3 << 'EOF'
          import re
          
          with open('home_expense.htm', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # Replace placeholders with actual secrets
          supabase_url = '${{ secrets.SUPABASE_URL }}'
          supabase_key = '${{ secrets.SUPABASE_KEY }}'
          
          content = content.replace('__SUPABASE_URL__', supabase_url)
          content = content.replace('__SUPABASE_KEY__', supabase_key)
          
          # Verify all placeholders are replaced
          remaining = re.findall(r'__[A-Z_]+__', content)
          if remaining:
              print(f"ERROR: Placeholders still exist: {remaining}")
              exit(1)
          
          # Debug: verify correct environment
          if 'skwogboredsczcyhlqgn' in supabase_url:
              print("✓ Configured for TEST environment")
          elif 'afcifzghlkxvnpulahub' in supabase_url:
              print("✓ Configured for LIVE environment")
          else:
              print(f"⚠ WARNING: Unknown Supabase project: {supabase_url}")
          
          print(f"✓ Supabase URL configured: {supabase_url}")
          print("✓ All placeholders replaced successfully")
          
          with open('home_expense.htm', 'w', encoding='utf-8') as f:
              f.write(content)
          EOF

      - name: Prepare build output
        run: |
          mkdir -p _site
          cp home_expense.htm _site/index.html
          cp home_expense.htm _site/home_expense.htm
          # Disable Jekyll
          touch _site/.nojekyll
          # Copy other static files if needed
          if [ -f user-manual.htm ]; then cp user-manual.htm _site/user-manual.htm; fi
          if [ -f README.md ]; then cp README.md _site/README.md; fi
          echo "Build output:"
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
