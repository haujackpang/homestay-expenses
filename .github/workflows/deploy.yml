name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Replace configuration placeholders
        run: |
          python3 << 'EOF'
          import re
          
          with open('home_expense.htm', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # Replace placeholders with actual secrets
          content = content.replace('__SUPABASE_URL__', '${{ secrets.SUPABASE_URL }}')
          content = content.replace('__SUPABASE_KEY__', '${{ secrets.SUPABASE_KEY }}')
          content = content.replace('__SUPABASE_SERVICE_KEY__', '${{ secrets.SUPABASE_SERVICE_KEY }}')
          
          # Verify all placeholders are replaced
          remaining = re.findall(r'__[A-Z_]+__', content)
          if remaining:
              print(f"ERROR: Placeholders still exist: {remaining}")
              exit(1)
          
          with open('home_expense.htm', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print("✓ All placeholders replaced successfully")
          EOF

      - name: Prepare build output
        run: |
          mkdir -p _site
          cp home_expense.htm _site/index.html
          cp home_expense.htm _site/home_expense.htm
          # Disable Jekyll
          touch _site/.nojekyll
          # Copy other static files if needed
          if [ -f user-manual.htm ]; then cp user-manual.htm _site/user-manual.htm; fi
          if [ -f README.md ]; then cp README.md _site/README.md; fi
          echo "Build output:"
          ls -la _site/

      - name: Deploy to gh-pages branch
        run: |
          git config user.email "bot@example.com"
          git config user.name "Deploy Bot"
          git fetch origin gh-pages --depth=1 2>/dev/null || git checkout --orphan gh-pages
          git worktree add -b gh-pages gh-pages-work origin/gh-pages || git worktree add gh-pages-work gh-pages
          rm -rf gh-pages-work/* || true
          cp -r _site/* gh-pages-work/
          cd gh-pages-work
          git add .
          git commit -m "Deploy from GitHub Actions" --allow-empty
          git push origin gh-pages
