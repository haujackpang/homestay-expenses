name: Scheduled Reservation Import

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-reservations-live
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'haujackpang/homestay-expenses'
    steps:
      - name: Verify live repository
        run: |
          if [ "${{ github.repository }}" != "haujackpang/homestay-expenses" ]; then
            echo "This workflow is only allowed in the live repository."
            exit 1
          fi

      - name: Import reservations from HostPlatform
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_KEY."
            exit 1
          fi

          project_ref="${SUPABASE_URL#https://}"
          project_ref="${project_ref%%.supabase.co*}"
          echo "Calling Supabase project ref: ${project_ref}"

          http_code="$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/functions/v1/sync-reservations" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"type":"scheduled"}')"

          echo "HTTP status: ${http_code}"
          echo "Response body:"
          cat response.txt

          case "${http_code}" in
            2??) ;;
            *)
              exit 1
              ;;
          esac
