// ===== FRONTEND ERROR LOGGER =====
async function logFrontendError(level,source,message,details){
  try{
    await sb.from('error_logs').insert({level:level,source:source,message:message,details:details||{},user_agent:navigator.userAgent});
  }catch(e){console.error('Failed to log error:',e);}
}
async function functionAuthHeaders(forceRefresh){
  var{data:sessData}=await sb.auth.getSession();
  var authToken=sessData&&sessData.session&&sessData.session.access_token?sessData.session.access_token:'';
  var expiresAt=sessData&&sessData.session&&sessData.session.expires_at?sessData.session.expires_at:0;
  var isExpiring=expiresAt&&expiresAt*1000<Date.now()+60000;
  if(forceRefresh||!authToken||isExpiring){var{data:refData}=await sb.auth.refreshSession();authToken=refData&&refData.session?refData.session.access_token:authToken;}
  if(!authToken)authToken=SUPABASE_KEY;
  return {'Content-Type':'application/json','Authorization':'Bearer '+authToken,'apikey':SUPABASE_KEY};
}
async function callEdgeFunction(name,body){
  var headers=await functionAuthHeaders();
  var r=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',headers:headers,body:JSON.stringify(body||{})});
  var d=await r.json().catch(function(){return{error:'Request failed'};});
  if(r.status===401){
    headers=await functionAuthHeaders(true);
    r=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',headers:headers,body:JSON.stringify(body||{})});
    d=await r.json().catch(function(){return{error:'Request failed'};});
  }
  if(!r.ok||d.ok===false)throw new Error(d.error||('Request failed (HTTP '+r.status+')'));
  return d;
}
async function loadErrorLogs(){
  errorLogLoading=true;render();
  try{
    var{data,error}=await sb.from('error_logs').select('*').order('created_at',{ascending:false}).limit(100);

    errorLogs=data||[];
  }catch(e){console.error('Failed to load error logs:',e);errorLogs=[];}

}

var PROPERTY_SHORT_CODES=['AR','IR','AC','CL','BR','SH','KT','LC','MP','OF'];
var CATS=['Water Bill','Electricity Bill','Internet Bill','Rental','MFSF','Maintenance & Repair','Housekeeping & Cleaning','Laundry','Daily Products','Hospitality Items','Electrical & Unit Setup','Office Expenses','Employee Welfare','Outsource Cleaning Staff','Unit Renovation','Other'];
var CAT_COLORS={'Water Bill':'#185FA5','Electricity Bill':'#0E6E9E','Internet Bill':'#2D5FA5','Rental':'#7C3AED','MFSF':'#A45D2B','Maintenance & Repair':'#854F0B','Housekeeping & Cleaning':'#3B6D11','Laundry':'#534AB7','Daily Products':'#0F6E56','Hospitality Items':'#993556','Electrical & Unit Setup':'#993C1D','Office Expenses':'#5F5E5A','Employee Welfare':'#185FA5','Outsource Cleaning Staff':'#854F0B','Unit Renovation':'#A32D2D','Other':'#888780'};

function hpPropertyKey(hpPropertyId,propertyName){
  if(hpPropertyId)return 'id:'+hpPropertyId;
  return 'name:'+String(propertyName||'').toLowerCase().trim();
}
function hpPropertyDomKey(k){return (k||'').replace(/[^a-zA-Z0-9_-]/g,'_');}
function unitDisplayName(u){
  if(!u)return'';
  if(u.mapped_unit_name)return u.mapped_unit_name;
  return u.property_short?u.property_short+' '+u.name:u.name;
}
function uniqueNames(arr){
  var seen={},out=[];
  arr.forEach(function(v){if(v&&!seen[v]){seen[v]=true;out.push(v);}});
  return out;
}
function internalUnitRows(){
  return UNITS_DATA
    .filter(function(u){return u.source!=='hostplatform'&&u.active!==false;})
    .map(function(u){return{value:unitDisplayName(u),shortCode:(u.property_short||'').toUpperCase()};})
    .sort(function(a,b){return a.value.localeCompare(b.value);});
}
function internalUnitOptions(selected){
  var sel=selected||'';
  var rows=internalUnitRows();
  var opts=['<option value="">— Select internal unit —</option>'];
  rows.forEach(function(r){opts.push('<option value="'+r.value+'" data-short="'+r.shortCode+'"'+(sel===r.value?' selected':'')+'>'+r.value+'</option>');});
  if(sel&&!rows.some(function(r){return r.value===sel;}))opts.push('<option value="'+sel+'" selected>'+sel+' (legacy)</option>');
  return opts.join('');
}
function mappedInternalUnitNames(exceptUnitId){
  var used={};
  UNITS_DATA
    .filter(function(u){return u.source==='hostplatform'&&u.active!==false&&u.id!==exceptUnitId&&u.mapped_unit_name;})
    .forEach(function(u){used[u.mapped_unit_name]=true;});
  return used;
}
function internalUnitMappingOptions(selected,exceptUnitId){
  var sel=selected||'';
  var used=mappedInternalUnitNames(exceptUnitId||'');
  var rows=internalUnitRows().filter(function(r){return !used[r.value]||r.value===sel;});
  var opts=['<option value="">-- Unmapped --</option>'];
  rows.forEach(function(r){opts.push('<option value="'+r.value+'" data-short="'+r.shortCode+'"'+(sel===r.value?' selected':'')+'>'+r.value+'</option>');});
  if(sel&&!rows.some(function(r){return r.value===sel;}))opts.push('<option value="'+sel+'" selected>'+sel+' (legacy)</option>');
  return opts.join('');
}
function hpIdsForDisplayUnit(unitName){
  return UNITS_DATA
    .filter(function(u){return u.source==='hostplatform'&&u.active!==false&&unitDisplayName(u)===unitName&&u.hp_unit_id;})
    .map(function(u){return u.hp_unit_id;});
}
function hpUnitRows(){
  return UNITS_DATA
    .filter(function(u){return u.source==='hostplatform';})
    .map(function(u){
      var unitKey=u.id||u.hp_unit_id||hpPropertyKey(u.hp_property_id,u.property_name)+'::'+u.name;
      return{
        key:unitKey,
        domKey:hpPropertyDomKey(unitKey),
        unitId:u.id||'',
        hpUnitId:u.hp_unit_id||'',
        hpPropertyId:u.hp_property_id||'',
        propertyName:u.property_name||'Unknown Property',
        unitName:u.name||'',
        mappedUnitName:u.mapped_unit_name||'',
        propertyShort:u.property_short||'',
        active:u.active!==false
      };
    })
    .sort(function(a,b){
      var pa=a.propertyName.localeCompare(b.propertyName);
      if(pa!==0)return pa;
      return a.unitName.localeCompare(b.unitName);
    });
}
function shortCodeOptions(selected){
  var sel=(selected||'').toUpperCase();
  var opts=['<option value="">— Unpair —</option>'];
  PROPERTY_SHORT_CODES.forEach(function(code){
    opts.push('<option value="'+code+'"'+(sel===code?' selected':'')+'>'+code+'</option>');
  });
  if(sel&&PROPERTY_SHORT_CODES.indexOf(sel)<0)opts.push('<option value="'+sel+'" selected>'+sel+' (legacy)</option>');
  return opts.join('');
}
async function dbAssignUnitShort(unitId,shortCode){
  var code=(shortCode||'').toUpperCase();
  var setQ=sb.from('units').update({property_short:code}).eq('id',unitId).eq('source','hostplatform');
  var setRes=await setQ;
  if(setRes.error)throw setRes.error;
}
async function dbAssignUnitMapping(unitId,mappedUnitName,shortCode){
  var payload={mapped_unit_name:mappedUnitName||'',property_short:(shortCode||'').toUpperCase()};
  var res=await sb.from('units').update(payload).eq('id',unitId).eq('source','hostplatform');
  if(res.error)throw res.error;
}
function mappingConflict(unitId,mappedUnitName){
  if(!mappedUnitName)return null;
  return UNITS_DATA.filter(function(u){return u.source==='hostplatform'&&u.active!==false&&u.id!==unitId&&u.mapped_unit_name===mappedUnitName;})[0]||null;
}

}

async function loadClaims(){
  var q=sb.from('claims').select('*').order('created_at',{ascending:false});

async function compressImageFile(file){
  if(typeof ImageCompression==='undefined'){console.warn('browser-image-compression not loaded');return file;}
  try{
    var options={maxSizeMB:0.3,maxWidthOrHeight:1280,useWebWorker:true};
    var compressed=await ImageCompression.compress(file,options);
    return new File([compressed],file.name,{type:'image/jpeg'});
  }catch(e){
    console.warn('Image compression failed',e);
    return file;
  }
}
async function imageToPdf(file){
  var jsPDFLib=window.jspdf&&window.jspdf.jsPDF?window.jspdf.jsPDF:null;
  if(!jsPDFLib){console.warn('jsPDF not loaded, uploading original');return file;}
  return new Promise(function(resolve){
    var url=URL.createObjectURL(file);
    var img=new Image();
    img.onload=function(){
      var w=img.naturalWidth,h=img.naturalHeight;
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url);
      var orient=w>h?'l':'p';
      var wPt=w*0.75,hPt=h*0.75;
      var doc=new jsPDFLib({orientation:orient,unit:'pt',format:[wPt,hPt]});
      var dataUrl=canvas.toDataURL('image/jpeg',0.90);
      doc.addImage(dataUrl,'JPEG',0,0,wPt,hPt);
      resolve(new File([doc.output('blob')],file.name.replace(/\.(jpe?g|png|gif|webp|heic|bmp)$/i,'.pdf'),{type:'application/pdf'}));
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

async function pdfToImageFile(file){
  if(typeof pdfjsLib==='undefined'){throw new Error('PDF.js not loaded');}
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var ab=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:ab}).promise;
  var numPages=Math.min(pdf.numPages,5); // scan up to 5 pages
  var scale=numPages>1?1.5:2.0; // lower scale for multi-page to control size
  var canvases=[];
  var totalHeight=0,maxWidth=0;
  for(var i=1;i<=numPages;i++){
    var page=await pdf.getPage(i);
    var viewport=page.getViewport({scale:scale});
    var canvas=document.createElement('canvas');
    canvas.width=viewport.width;canvas.height=viewport.height;
    var ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:viewport}).promise;
    canvases.push(canvas);
    totalHeight+=viewport.height;
    if(viewport.width>maxWidth)maxWidth=viewport.width;
  }
  // Stitch all pages vertically into one image
  var merged=document.createElement('canvas');
  merged.width=maxWidth;merged.height=totalHeight;
  var mctx=merged.getContext('2d');
  var yOffset=0;
  canvases.forEach(function(c){mctx.drawImage(c,0,yOffset);yOffset+=c.height;});
  return new Promise(function(resolve,reject){
    merged.toBlob(function(blob){
      if(!blob){reject(new Error('PDF conversion failed'));return;}
      resolve(new File([blob],file.name.replace(/\.pdf$/i,'.jpg'),{type:'image/jpeg'}));
    },'image/jpeg',0.90);
  });
}

function generateDescription(ai){
  var cat=ai.category||'';
  var summary=(ai.summary||'').toLowerCase();
  var items=ai.items||[];
  var refNo=ai.reference_number||'';
  var allText=(summary+' '+items.map(function(i){return i.name;}).join(' ')).toLowerCase();
  var desc='';
  if(allText.match(/electric|tnb|tenaga|elektrik|kwh/)) desc='Electricity Bill';
  else if(allText.match(/water bill|syabas|air bersih|pba|water supply|indah water/)||cat==='Utilities'&&allText.match(/water/)) desc='Water Bill';
  else if(allText.match(/internet|broadband|fibre|fiber|unifi|streamyx|tm one|maxis|celcom|digi fiber/)) desc='Internet Bill';
  else if(allText.match(/\bgas\b|petgas|gas supply|gas bill/)) desc='Gas Bill';
  else if(allText.match(/petrol|fuel|diesel|petronas|shell|caltex|ron\s*9|ron\s*95|ron\s*97|bph/)) desc='Fuel Purchase';
  else if(cat==='Laundry'||allText.match(/laundry|dobi|launder/)) desc='Laundry';
  else if(cat==='Housekeeping & Cleaning'||allText.match(/housekeep|cleaning service|cuci rumah/)) desc='Housekeeping & Cleaning';
  else if(cat==='Daily Products'||allText.match(/daily product|toiletries|toiletry|sabun|shampoo|tissue/)) desc='Daily Products Purchase';
  else if(cat==='Hospitality Items'||allText.match(/hospitality|amenity|amenities|towel|pillow|bedsheet/)) desc='Hospitality Items';
  else if(cat==='Maintenance & Repair'||allText.match(/repair|maintenance|servis|fix|plumb/)) desc='Maintenance & Repair';
  else if(cat==='Electrical & Unit Setup'||allText.match(/electrical setup|unit setup|aircond install|wiring/)) desc='Electrical & Unit Setup';
  else if(cat==='Office Expenses'||allText.match(/office|stationery|printing|photocopy/)) desc='Office Expenses';
  else if(cat==='Employee Welfare'||allText.match(/welfare|medical|meal allowance/)) desc='Employee Welfare';
  else if(cat==='Outsource Cleaning Staff'||allText.match(/outsource|cleaning staff|contractor/)) desc='Outsource Cleaning Staff';
  else if(cat==='Unit Renovation'||allText.match(/renovation|renovate|paint|tile/)) desc='Unit Renovation';
  else desc=ai.summary||'Receipt';
  if(refNo) desc=desc+' - '+refNo;
  return desc;
}

async function exportReportPDF(){
  if(!rptUnit||!rptMonth||!rptYear){toast('Missing unit or period');return;}
  var jsPDFLib=window.jspdf&&window.jspdf.jsPDF?window.jspdf.jsPDF:null;
  if(!jsPDFLib){toast('PDF library not loaded');return;}
  var APPROVED_STATUSES=['Approved','Claimed','Auto-Approved','Company-Paid'];
  var ym=rptYear+'-'+rptMonth;
  var rc=claims.filter(function(c){return c.unit===rptUnit&&APPROVED_STATUSES.indexOf(c.status)>=0&&(c.expMonth||c.date.slice(0,7))===ym;});
  var shared=rc.filter(function(c){return c.chargedTo==='Both';});
  var ownerCl=rc.filter(function(c){return c.chargedTo==='Owner';});
  var cfg=unitConfig.filter(function(x){return x.unit_name===rptUnit;})[0]||{};
  var ownerName=cfg.owner_name||'—';
  var monthLabel=MONTHS[rptMonth]+' '+rptYear;
  try{
    var doc=new jsPDFLib({orientation:'p',unit:'mm',format:'a4'});
    var x=12,y=16,pw=186,rCol=x+pw,pageBottom=282;
    function money(v){return 'RM '+(Number(v)||0).toFixed(2);}
    function dmy(v){if(!v)return'--';var d=String(v).slice(0,10);return d.length===10?d.slice(8,10)+' '+(MONTHS[d.slice(5,7)]||d.slice(5,7))+' '+d.slice(0,4):String(v);}
    function addPageIfNeeded(h){if(y+h>pageBottom){doc.addPage();y=16;}}
    function line(){doc.setDrawColor(210,210,210);doc.setLineWidth(0.3);doc.line(x,y,x+pw,y);y+=5;}
    function right(text,xx,yy){doc.text(text,xx-doc.getTextWidth(text),yy);}
    function section(title){
      addPageIfNeeded(12);
      doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(17,24,39);
      doc.text(title,x,y);y+=4;
      doc.setDrawColor(230,230,230);doc.line(x,y,x+pw,y);y+=5;
    }
    function row(label,value,bold){
      addPageIfNeeded(6);
      doc.setFontSize(9);doc.setFont(undefined,bold?'bold':'normal');doc.setTextColor(55,65,81);
      doc.text(label,x,y);right(value,rCol,y);y+=5;
    }
    function tableHeader(cols){
      addPageIfNeeded(10);
      doc.setFillColor(243,244,246);doc.rect(x,y-4,pw,7,'F');
      doc.setFontSize(7.4);doc.setFont(undefined,'bold');doc.setTextColor(55,65,81);
      cols.forEach(function(c){doc.text(c.t,x+c.x,y);});
      y+=5;
    }
    function reportTitle(){
      var hp=UNITS_DATA.filter(function(u){return u.source==='hostplatform'&&unitDisplayName(u)===rptUnit;})[0]||null;
      if(hp)return ((hp.property_name||'').trim()+' '+(hp.name||rptUnit)).trim();
      return rptUnit;
    }
    var title=reportTitle();
    var pdfHpIds=hpIdsForDisplayUnit(rptUnit);
    var pdfRes=reservations.filter(function(r){if(!r.start_date||!r.unit_name)return false;if(r.booking_type===6)return false;if(r.booking_status&&r.booking_status.indexOf('Cancel')>=0)return false;var unitMatch=r.unit_name===rptUnit||(r.hp_unit_id&&pdfHpIds.indexOf(r.hp_unit_id)>=0);return unitMatch&&r.start_date.slice(0,7)===ym;});
    pdfRes.sort(function(a,b){return String(a.start_date||'').localeCompare(String(b.start_date||''));});
    var bkCount=pdfRes.length;
    var bkRev=pdfRes.reduce(function(s,r){return s+parseFloat(r.rental||0)+parseFloat(r.extra_guest||0);},0);
    var cleaningRate=(parseFloat(cfg.cleaning_fee||0)+parseFloat(cfg.laundry_fee||0));
    var cleaningTotal=bkCount*cleaningRate;
    var profitPct=parseFloat(cfg.service_fee_pct||0)||0;
    var sharedTotal=shared.reduce(function(s,c){return s+c.amount;},0);
    var homestayProfit=bkRev-sharedTotal;
    var managementFee=homestayProfit*profitPct/100;
    var ownerExpenseTotal=ownerCl.reduce(function(s,c){return s+c.amount;},0);
    var ownerExpensesTotal=ownerExpenseTotal;
    var ownerProfit=homestayProfit-managementFee-ownerExpensesTotal;

    doc.setFontSize(17);doc.setFont(undefined,'bold');doc.setTextColor(0,0,0);
    doc.text(title,x,y);y+=7;
    doc.setFontSize(9);doc.setFont(undefined,'normal');doc.setTextColor(80,80,80);
    doc.text('Owner: '+ownerName,x,y);doc.text('Period: '+monthLabel,x+82,y);y+=6;
    line();

    section('Booking Details');
    tableHeader([{t:'Guest',x:2},{t:'Check-in',x:70},{t:'Check-out',x:102},{t:'Nights',x:134},{t:'Total',x:172}]);
    doc.setFont(undefined,'normal');doc.setFontSize(7.4);doc.setTextColor(45,45,45);
    if(!pdfRes.length){doc.text('No booking records for this unit/month',x+2,y);y+=6;}
    pdfRes.forEach(function(r){
      addPageIfNeeded(8);
      var rental=parseFloat(r.rental||0),extra=parseFloat(r.extra_guest||0),total=rental+extra;
      var guest=doc.splitTextToSize(String(r.guest_name||'Guest'),48)[0]||'Guest';
      doc.text(guest,x+2,y);
      doc.text(dmy(r.start_date),x+70,y);
      doc.text(dmy(r.end_date),x+102,y);
      doc.text(String(r.nights||0),x+138,y);
      right(money(total),rCol,y);
      y+=5;
    });
    row('Sales',money(bkRev),true);y+=2;

    section('Expenses Details');
    var expenseRows=ownerCl.concat(shared).sort(function(a,b){return String(a.category||'').localeCompare(String(b.category||''));});
    var expenseCats={};expenseRows.forEach(function(c){if(!expenseCats[c.category])expenseCats[c.category]=0;expenseCats[c.category]+=c.amount;});
    tableHeader([{t:'Category',x:2},{t:'Amount',x:168}]);
    doc.setFont(undefined,'normal');doc.setFontSize(7.4);doc.setTextColor(45,45,45);
    if(!expenseRows.length){doc.text('No owner/shared expenses for this unit/month',x+2,y);y+=6;}
    Object.entries(expenseCats).forEach(function(e){
      addPageIfNeeded(8);
      doc.text(doc.splitTextToSize(e[0]||'',130)[0]||'',x+2,y);
      right(money(e[1]),rCol,y);
      y+=5;
    });
    row('Sharing Expenses',money(sharedTotal),true);
    row('Cleaning fee',money(cleaningTotal),true);
    row('Homestay Profit',money(homestayProfit),true);y+=2;

    section('Homestay Management Fee');
    row('Homestay Management Fee',money(managementFee),true);y+=2;

    section('Owner Expenses');
    var ownerCats={};ownerCl.forEach(function(c){if(!ownerCats[c.category])ownerCats[c.category]=0;ownerCats[c.category]+=c.amount;});
    Object.entries(ownerCats).forEach(function(e){row(e[0],money(e[1]),false);});
    row('Total Owner Expenses',money(ownerExpensesTotal),true);
    y+=2;

    section('Owner');
    row('Owner',ownerName,false);
    row('Homestay Profit',money(homestayProfit),false);
    row('Less: Homestay Management Fee',money(managementFee),false);
    row('Less: Owner Expenses',money(ownerExpensesTotal),false);
    doc.setDrawColor(0);doc.setLineWidth(0.5);doc.line(x,y,x+pw,y);y+=6;
    doc.setFontSize(12);doc.setFont(undefined,'bold');doc.setTextColor(0,0,0);
    doc.text('Owner Profit',x,y);right(money(ownerProfit),rCol,y);y+=10;

    if(y>pageBottom-8){doc.addPage();y=16;}
    doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(150,150,150);
    doc.text('Generated: '+new Date().toLocaleDateString('en-MY')+' - Homestay Expense System',x,y);
    doc.save(title.replace(/[^\w]+/g,'_')+'_'+MONTHS[rptMonth]+rptYear+'.pdf');
    toast('PDF exported');
  }catch(e){console.error('PDF export error:',e);toast('Failed to export PDF');}
}

};

    if(!mappedUnit)propertyShort='';
    var conflict=mappingConflict(editingUnit.id,mappedUnit);
    if(conflict){unitFormError=mappedUnit+' is already paired to another HP unit';render();return;}
    try{
      await dbAssignUnitMapping(editingUnit.id,mappedUnit,propertyShort);
      await loadUnits();
      await logAdminAction('unit-mapping.saved',{unit_id:editingUnit.id,mapped_unit_name:mappedUnit,property_short:propertyShort});
      toast(mappedUnit?'Unit updated':'Mapping cleared');
      editingUnit=null;
      ss('adminUnits','adminDash');
    }catch(e){
      unitFormError='Failed to update unit';
      render();
    }
  }else{
    var nameEl=document.getElementById('unit-name');
    if(!nameEl||!nameEl.value.trim()){unitFormError='Unit name is required';render();return;}
    var name=nameEl.value.trim();
    if(editingUnit){
      var ok=await dbUpdateUnit(editingUnit.id,{name:name,property_short:propertyShort});
      if(ok){await loadUnits();await logAdminAction('unit.saved',{unit_id:editingUnit.id,unit_name:name,property_short:propertyShort});toast('Unit updated');editingUnit=null;ss('adminUnits','adminDash');}
      else{unitFormError='Failed to update. Name may already exist.';render();}
    }else{
      var ok=await dbInsertUnit(name,propertyShort);
      if(ok){await loadUnits();await logAdminAction('unit.saved',{unit_name:name,property_short:propertyShort});toast('Unit "'+name+'" added');ss('adminUnits','adminDash');}
      else{unitFormError='Failed to add. Name may already exist.';render();}
    }
  }
};
window.mgrScanReceipt=function(){
  var inp=document.getElementById('receipt-input');
  if(!inp){inp=document.createElement('input');inp.type='file';inp.id='receipt-input';inp.accept='image/*,.pdf';inp.style.display='none';inp.setAttribute('capture','environment');document.body.appendChild(inp);}
  inp.value='';inp.removeAttribute('multiple');
  inp.onchange=async function(){
    if(!inp.files||!inp.files.length)return;
    var f=inp.files[0];
    if(f.name.match(/\.pdf$/i)){
      aiAnalyzing=true;render();
      try{f=await pdfToImageFile(f);}catch(e){aiAnalyzing=false;render();toast('PDF conversion failed: '+e.message);return;}
    }
    pendingFiles=[f];pendingFileNames=[f.name];
    aiAnalyzing=true;render();
    try{
      var currentUnit=document.getElementById('f-unit');
      var selectedUnit=currentUnit?currentUnit.value:'';
      var ai=await analyzeInvoiceFile(f,selectedUnit);
      aiResult=ai;
      aiAnalyzing=false;render();
      // Pre-fill the form fields after render
      setTimeout(function(){
        var d=document.getElementById('f-desc'),a=document.getElementById('f-amount'),dt=document.getElementById('f-date'),c=document.getElementById('f-cat'),u=document.getElementById('f-unit'),em=document.getElementById('f-expmonth');
        if(d)d.value=formatAiDescription(ai);
        if(a)a.value=ai.total||'';
        if(dt&&ai.date)dt.value=ai.date;
        if(c&&ai.category){for(var i=0;i<c.options.length;i++){if(c.options[i].value===ai.category){c.selectedIndex=i;break;}}}
        var unitVal=selectedUnit||(ai.suggested&&ai.suggested.unit)||ai.unit_hint||'';
        if(u&&unitVal){for(var j=0;j<u.options.length;j++){if(u.options[j].value===unitVal){u.selectedIndex=j;break;}}toggleChargeTo(u.value,'f-charge-wrap');}
        var expVal=(ai.suggested&&ai.suggested.expense_month)||ai.expense_month||'';
        if(em&&expVal){for(var k=0;k<em.options.length;k++){if(em.options[k].value===expVal){em.selectedIndex=k;break;}}}
        if(ai.duplicate_claims&&ai.duplicate_claims.length){toast('Possible duplicate: '+ai.duplicate_claims[0].claim_id);}
        else{toast('AI filled: '+ai.summary);}
      },50);
    }catch(e){
      aiAnalyzing=false;render();
      toast('AI scan failed: '+(e.message||'Try again'));
      logFrontendError('error','mgrScanReceipt',e.message||'AI scan failed',{stack:e.stack});
    }
  };
  inp.click();
};
window.mgrChangeToReject=async function(){
  var amt=document.getElementById('rv-amt');
  var upd={status:'Rejected',rejectReason:'Decision revised by manager'};
  if(amt&&amt.value)upd.amount=parseFloat(amt.value);
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Rejected');editingId=null;ss('adminList','adminDash');
};
window.mgrChangeToApprove=async function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit'),amt=document.getElementById('rv-amt'),chg=document.getElementById('rv-charged');
  var upd={status:'Approved',rejectReason:''};
  if(cat&&cat.value)upd.category=cat.value;if(unit&&unit.value)upd.unit=unit.value;if(amt&&amt.value)upd.amount=parseFloat(amt.value);if(unit&&unit.value==='MP Office')upd.chargedTo='';else if(chg&&chg.value)upd.chargedTo=chg.value;
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Approved');editingId=null;ss('adminList','adminDash');
};
window.openErrorLogs=function(){
  if(!isSystemAdmin){toast('Only admin can access logs');return;}
  ss('errorLogs','adminDash');
  loadErrorLogs();
  loadSyncLogs().then(function(){if(S==='errorLogs')render();});
};
window.toggleInactiveUnits=function(){showInactiveUnits=!showInactiveUnits;render();};
window.resolveErrorLog=async function(id){
  try{await sb.from('error_logs').update({resolved:true}).eq('id',id);errorLogs=errorLogs.map(function(l){if(l.id===id)l.resolved=true;return l;});render();}catch(e){toast('Failed to update');}
};
window.clearResolvedLogs=async function(){
  if(!confirm('Delete all resolved logs?'))return;
  try{await sb.from('error_logs').delete().eq('resolved',true);errorLogs=errorLogs.filter(function(l){return!l.resolved;});render();toast('Resolved logs cleared');}catch(e){toast('Failed to clear');}
};

// ===== INIT: CHECK SESSION =====
function startInit(){
  (async function(){
    try {
      console.log('Initializing app...');
      console.log('Supabase loaded:', typeof supabase !== 'undefined');
      console.log('sb client:', typeof sb !== 'undefined');
      if(!sb || !sb.auth){
        throw new Error('Supabase client not ready');
      }
      render(); // show auth screen
      console.log('Initial render called');
      var{data:{session}}=await sb.auth.getSession();
      console.log('Session check:', session ? 'logged in' : 'no session');
      if(session&&session.user){
        await initSession(session.user);
      }
      sb.auth.onAuthStateChange(async function(event,session){
        if(event==='SIGNED_OUT'){
          currentUser=null;currentProfile=null;R=null;S='auth';claims=[];render();
        }
      });
    } catch(e) {
      console.error('Init error:', e.message, e);
      var ms=document.getElementById('ms');
      if(ms){
        ms.innerHTML = '<div style="padding:20px;color:red"><strong>Error:</strong> ' + e.message + '</div>';
      }
    }
  })();
}

// Wait for DOM ready and all scripts to load
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',startInit);
}else{
  startInit();
}
</script>
