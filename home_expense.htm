<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Expense System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#f0f2f5;display:flex;justify-content:center;padding:20px 0 40px;}
.phone{width:375px;min-height:680px;background:#fff;border:1px solid #ddd;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.topbar{padding:13px 14px 11px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee;flex-shrink:0;}
.tbt{font-size:15px;font-weight:600;flex:1;color:#111;}
.tbr{font-size:10px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:99px;border:1px solid #e0e0e0;}
.bkb{font-size:13px;color:#2563eb;cursor:pointer;}
.lob{font-size:11px;color:#ef4444;cursor:pointer;padding:3px 8px;border:1px solid #fca5a5;border-radius:99px;white-space:nowrap;}
.scr{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;}
.nav{display:flex;border-top:1px solid #eee;flex-shrink:0;}
.ni{flex:1;padding:8px 0;text-align:center;font-size:9px;color:#888;cursor:pointer;line-height:1.4;}
.ni.on{color:#2563eb;}
.ni-ic{font-size:14px;display:block;}
.hero{border-radius:12px;padding:14px;}
.sgrid{display:grid;gap:7px;}
.sbox{background:#f9fafb;border-radius:8px;padding:9px;text-align:center;border:1px solid #e5e7eb;cursor:pointer;}
.snum{font-size:18px;font-weight:600;}
.slbl{font-size:10px;color:#6b7280;margin-top:1px;}
.cc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;}
.cc:hover{background:#f9fafb;}
.cc-id{font-size:10px;color:#9ca3af;font-family:monospace;}
.cc-desc{font-size:13px;font-weight:600;color:#111;margin-top:1px;}
.cc-r{text-align:right;flex-shrink:0;margin-left:8px;}
.cc-amt{font-size:13px;font-weight:600;color:#111;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:500;margin-top:3px;}
.bd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.b-sub{background:#dbeafe;color:#1d4ed8;}.b-sub .bd{background:#1d4ed8;}
.b-appr{background:#d1fae5;color:#065f46;}.b-appr .bd{background:#065f46;}
.b-rej{background:#fee2e2;color:#991b1b;}.b-rej .bd{background:#991b1b;}
.b-draft{background:#f3f4f6;color:#374151;}.b-draft .bd{background:#374151;}
.b-claimed{background:#fef3c7;color:#92400e;}.b-claimed .bd{background:#92400e;}
.b-auto{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;}.b-auto .bd{background:#9ca3af;}
.b-copay{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;}.b-copay .bd{background:#065f46;}
.pbtn{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.btn-p{background:#dbeafe;color:#1d4ed8;}
.btn-s{background:#d1fae5;color:#065f46;}
.btn-d{background:#fee2e2;color:#991b1b;}
.btn-o{background:transparent;border:1px solid #d1d5db;color:#374151;}
.btn-w{background:#fef3c7;color:#92400e;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;color:#6b7280;}
.fi{border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;font-size:13px;color:#111;background:#fff;width:100%;}
.fi:focus{outline:none;border-color:#2563eb;}
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.up-box{border:1px dashed #d1d5db;border-radius:8px;padding:14px;text-align:center;cursor:pointer;}
.dc{background:#f9fafb;border-radius:12px;padding:12px;border:1px solid #e5e7eb;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:9px;}
.di{background:#fff;border-radius:8px;padding:7px 9px;border:1px solid #e5e7eb;}
.dil{font-size:10px;color:#6b7280;}
.div_{font-size:12px;font-weight:600;color:#111;margin-top:1px;}
.rbox{background:#fee2e2;border-radius:8px;padding:8px 10px;margin-top:6px;}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.brow{margin-bottom:6px;}
.blbl{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-bottom:2px;}
.btrk{height:5px;background:#f3f4f6;border-radius:99px;overflow:hidden;}
.bfil{height:5px;border-radius:99px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:11px;padding:6px 14px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;}
.sec-t{font-size:13px;font-weight:600;color:#111;}
.va{font-size:12px;color:#2563eb;cursor:pointer;}
.flt-row{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:11px;padding:3px 8px;border-radius:99px;border:1px solid #d1d5db;cursor:pointer;color:#6b7280;background:#fff;white-space:nowrap;}
.chip.on{background:#dbeafe;color:#1d4ed8;border-color:transparent;}
.chk{width:16px;height:16px;border-radius:4px;border:1px solid #d1d5db;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;}
.chk.on{background:#2563eb;border-color:transparent;}
.slip-box{background:#fef3c7;border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:8px;}
.role-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;gap:10px;min-height:500px;}
.info-box{border-radius:8px;padding:9px 11px;}
.ptype-card{border:1px solid #e5e7eb;border-radius:12px;padding:10px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;}
.ptype-card.on{border-color:#93c5fd;background:#dbeafe;}
.ptype-title{font-size:12px;font-weight:600;color:#111;}
.ptype-desc{font-size:11px;color:#6b7280;margin-top:1px;}
.ptype-card.on .ptype-title,.ptype-card.on .ptype-desc{color:#1d4ed8;}
.lock-bar{border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;background:#f3f4f6;border:1px solid #e5e7eb;}
.edit-bar{border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;background:#fef3c7;}
.edit-link{font-size:12px;font-weight:600;color:#92400e;cursor:pointer;text-decoration:underline;}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px;}
.sum-row:last-child{border-bottom:none;font-weight:600;}
.tab-bar{display:flex;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;}
.tab-opt{flex:1;padding:8px;text-align:center;font-size:12px;cursor:pointer;color:#6b7280;background:#fff;}
.tab-opt.on{background:#dbeafe;color:#1d4ed8;font-weight:600;}
.emp-pay-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:8px;}
.eph{padding:11px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid #e5e7eb;cursor:pointer;}
.eph:hover{background:#f9fafb;}
.eph.no-border{border-bottom:none;}
.avatar{width:34px;height:34px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1d4ed8;flex-shrink:0;}
.emp-list-row{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px;}
.emp-list-row:hover{background:#f9fafb;}
.bank-card{background:#f9fafb;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb;}
.bk-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f3f4f6;}
.bk-row:last-child{border-bottom:none;}
.bk-lbl{color:#6b7280;}
.bk-val{font-weight:600;color:#111;}
.bk-val.mono{font-family:monospace;}
.no-bank{background:#fee2e2;border-radius:8px;padding:8px 11px;font-size:11px;color:#991b1b;}
.ecr{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6;}
.ecr:last-child{border-bottom:none;}
.transfer-summary{background:#d1fae5;border-radius:8px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<div class="phone" id="app">
<div class="topbar" id="topbar">
  <span id="bb" class="bkb" style="display:none" onclick="goBack()">← Back</span>
  <span class="tbt" id="tbt">Home Expense</span>
  <span class="tbr" id="tbr" style="display:none"></span>
  <span id="lob" class="lob" style="display:none" onclick="logout()">Logout</span>
</div>
<div id="ms" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;"></div>
<div id="nav" class="nav" style="display:none"></div>
<div class="toast" id="toast"></div>
</div>

<script>
var R=null,S='role',PS=null,SEL=null,NN=8,editingId=null,payTab='byEmp';
var fltStatus='All',fltMonth='All',fltYear='All',fltEmp='All';
var empFltStatus='All',empFltMonth='All',empFltYear='All';
var dashFltMonth='All',dashFltYear='All',dashFltUnit='All';
var checkedClaims={},slipUploaded=false;
var mgrFormEmp='Ahmad Razif',mgrFormPayType='employee';
var empExpandMap={},editingBankEmp=null;

var MONTHS={'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
var YEARS=['2025','2026'];
var UNITS=['Villa Dahlia','Villa Mawar','Office KL','Office JB'];
var CATS=['Utilities','Maintenance & Repair','Housekeeping & Cleaning','Laundry','Daily Supplies','Hospitality Items','Electrical & Setup','Office Expenses','Employee Welfare','Outsource Staff','Unit Renovation','Other'];
var CAT_COLORS={'Utilities':'#185FA5','Maintenance & Repair':'#854F0B','Housekeeping & Cleaning':'#3B6D11','Laundry':'#534AB7','Daily Supplies':'#0F6E56','Hospitality Items':'#993556','Electrical & Setup':'#993C1D','Office Expenses':'#5F5E5A','Employee Welfare':'#185FA5','Outsource Staff':'#854F0B','Unit Renovation':'#A32D2D','Other':'#888780'};

var BANK_INFO={
  'Ahmad Razif':{bank:'Maybank',acc:'1234 5678 9012',fullName:'Ahmad Razif bin Abdullah'},
  'Siti Aminah':{bank:'CIMB Bank',acc:'8001 2345 6789',fullName:'Siti Aminah binti Yusof'},
  'Lee Wei Jian':{bank:'',acc:'',fullName:''},
  'Priya Nair':{bank:'RHB Bank',acc:'5566 7788 9900',fullName:'Priya d/o Nair Kumar'},
};
var EMPS=Object.keys(BANK_INFO);

var claims=[
  {id:'HE-2026-03-00001',emp:'Ahmad Razif',unit:'Villa Dahlia',category:'Utilities',desc:'TNB Bill March',amount:245,date:'2026-03-01',status:'Approved',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'self'},
  {id:'HE-2026-03-00002',emp:'Ahmad Razif',unit:'',category:'',desc:'Pipe leak repair',amount:180,date:'2026-03-05',status:'Submitted',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'self'},
  {id:'HE-2026-03-00003',emp:'Siti Aminah',unit:'',category:'',desc:'Monthly cleaning service',amount:120,date:'2026-03-10',status:'Rejected',rejectReason:'Receipt photo not legible',slipRef:'',payType:'employee',submittedBy:'self'},
  {id:'HE-2026-03-00004',emp:'Lee Wei Jian',unit:'Office KL',category:'Office Expenses',desc:'Printer cartridge',amount:89.50,date:'2026-03-12',status:'Approved',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'self'},
  {id:'HE-2026-03-00005',emp:'Priya Nair',unit:'Villa Mawar',category:'Utilities',desc:'Unifi Monthly Bill',amount:139,date:'2026-03-15',status:'Claimed',rejectReason:'',slipRef:'SLIP-001',payType:'employee',submittedBy:'self'},
  {id:'HE-2026-02-00001',emp:'Ahmad Razif',unit:'Office KL',category:'Office Expenses',desc:'Printer ink & stationery',amount:67,date:'2026-02-10',status:'Approved',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'self'},
  {id:'HE-2026-02-00002',emp:'Siti Aminah',unit:'Villa Dahlia',category:'Laundry',desc:'Linen laundry Feb',amount:155,date:'2026-02-18',status:'Approved',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'self'},
  {id:'CO-2026-03-00001',emp:'',unit:'Villa Mawar',category:'Utilities',desc:'Water bill (company card)',amount:210,date:'2026-03-02',status:'Company-Paid',rejectReason:'',slipRef:'',payType:'company',submittedBy:'manager'},
  {id:'MGR-2026-03-00001',emp:'Ahmad Razif',unit:'Office KL',category:'Employee Welfare',desc:'Team lunch',amount:95,date:'2026-03-08',status:'Auto-Approved',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'manager'},
];

function isPaidOut(c){return c.status==='Claimed'||c.status==='Company-Paid';}
function empCanEdit(c){return(c.status==='Submitted'||c.status==='Draft')&&!isPaidOut(c);}
function mgrCanEdit(c){return(c.status==='Approved'||c.status==='Rejected'||c.status==='Auto-Approved')&&!isPaidOut(c);}
function initials(n){var p=n.split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function hasBankInfo(emp){var b=BANK_INFO[emp];return b&&b.bank&&b.acc&&b.fullName;}

function sbadge(s){
  var m={Submitted:'b-sub',Approved:'b-appr',Rejected:'b-rej',Draft:'b-draft',Claimed:'b-claimed','Auto-Approved':'b-auto','Company-Paid':'b-copay'};
  return '<span class="badge '+(m[s]||'b-draft')+'"><span class="bd"></span>'+s+'</span>';
}
function ccCard(c,fn){
  var byTag=c.submittedBy==='manager'?'<span style="font-size:9px;color:#6b7280;background:#f3f4f6;border-radius:99px;padding:1px 4px;border:1px solid #e5e7eb;margin-left:3px">mgr</span>':'';
  var unitTag=c.unit?'<span style="font-size:9px;background:#f3f4f6;color:#6b7280;border-radius:99px;padding:1px 5px;border:1px solid #e5e7eb">'+c.unit+'</span>':'';
  return '<div class="cc" onclick="'+fn+'"><div style="flex:1;min-width:0"><div class="cc-id">'+c.id+'</div><div class="cc-desc">'+c.desc+'</div><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px">'+(c.category?'<span style="font-size:10px;color:#6b7280">'+c.category+'</span>':'<span style="font-size:10px;color:#9ca3af;font-style:italic">No category</span>')+(R==='admin'&&c.emp?'<span style="font-size:10px;color:#9ca3af">· '+c.emp.split(' ')[0]+'</span>'+byTag:'')+unitTag+'</div></div><div class="cc-r"><div class="cc-amt">RM '+c.amount.toFixed(2)+'</div>'+sbadge(c.status)+'</div></div>';
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function ss(s,p){PS=p||S;S=s;render();}
function goBack(){ss(PS||(R==='admin'?'adminDash':'empHome'));}
function logout(){R=null;S='role';PS=null;render();}
function loginAs(r){R=r;ss(r==='admin'?'adminDash':'empHome');}

function filterClaims(list,st,mo,yr,em){
  return list.filter(function(c){
    if(st&&st!=='All'&&c.status!==st)return false;
    if(mo&&mo!=='All'&&c.date.slice(5,7)!==mo)return false;
    if(yr&&yr!=='All'&&c.date.slice(0,4)!==yr)return false;
    if(em&&em!=='All'&&c.emp!==em)return false;
    return true;
  });
}
function approveClaim(id,cat,unit){
  claims.forEach(function(c){if(c.id===id){c.status='Approved';if(cat)c.category=cat;if(unit)c.unit=unit;c.rejectReason='';}});
  toast('Claim approved');ss('adminList','adminDash');
}
function rejectClaim(id,reason){
  claims.forEach(function(c){if(c.id===id){c.status='Rejected';c.rejectReason=reason||'No reason given';}});
  toast('Claim rejected');ss('adminList','adminDash');
}
function markClaimed(){
  var ids=Object.keys(checkedClaims).filter(function(k){return checkedClaims[k];});
  if(!slipUploaded){toast('Please upload bank slip first');return;}
  if(!ids.length){toast('Select at least one claim');return;}
  var ref='SLIP-'+Date.now().toString().slice(-6);
  claims.forEach(function(c){if(ids.indexOf(c.id)>=0){c.status='Claimed';c.slipRef=ref;}});
  checkedClaims={};slipUploaded=false;
  toast(ids.length+' claim(s) marked as Claimed');ss('adminDash');
}
function saveBankInfo(){
  var b=document.getElementById('p-bank'),a=document.getElementById('p-acc'),n=document.getElementById('p-name');
  if(!b||!a||!n||!b.value||!a.value||!n.value){toast('Please fill all fields');return;}
  BANK_INFO[editingBankEmp]={bank:b.value,acc:a.value,fullName:n.value};
  toast('Bank info saved for '+editingBankEmp);editingBankEmp=null;ss('adminEmployees','adminDash');
}
function saveEmpEdit(){
  var desc=document.getElementById('f-desc'),amt=document.getElementById('f-amount'),dt=document.getElementById('f-date');
  if(!desc||!amt||!dt||!desc.value||!amt.value||!dt.value){toast('Please fill all required fields');return;}
  claims.forEach(function(c){if(c.id===editingId){c.desc=desc.value;c.amount=parseFloat(amt.value);c.date=dt.value;}});
  toast('Claim updated');editingId=null;ss('claimDetail',PS);
}
function submitEmpEdit(){
  var desc=document.getElementById('f-desc'),amt=document.getElementById('f-amount'),dt=document.getElementById('f-date');
  if(!desc||!amt||!dt||!desc.value||!amt.value||!dt.value){toast('Please fill all required fields');return;}
  claims.forEach(function(c){if(c.id===editingId){c.desc=desc.value;c.amount=parseFloat(amt.value);c.date=dt.value;c.status='Submitted';}});
  toast('Claim re-submitted');editingId=null;ss('empList','empHome');
}
function saveMgrEdit(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit'),amt=document.getElementById('rv-amt');
  claims.forEach(function(c){if(c.id===editingId){if(cat&&cat.value)c.category=cat.value;if(unit&&unit.value)c.unit=unit.value;if(amt&&amt.value)c.amount=parseFloat(amt.value);}});
  toast('Claim updated');editingId=null;ss('adminList','adminDash');
}
function submitNewClaim(asDraft){
  var desc=document.getElementById('f-desc'),amt=document.getElementById('f-amount'),dt=document.getElementById('f-date');
  if(!desc||!amt||!dt)return;
  var dv=desc.value,av=parseFloat(amt.value),dtv=dt.value;
  if(!asDraft&&(!dv||!av||!dtv)){toast('Please fill all required fields');return;}
  var nc={id:'HE-2026-03-'+String(NN++).padStart(5,'0'),emp:'Ahmad Razif',unit:'',category:'',desc:dv||'(untitled)',amount:av||0,date:dtv||'2026-03-22',status:asDraft?'Draft':'Submitted',rejectReason:'',slipRef:'',payType:'employee',submittedBy:'self'};
  claims.unshift(nc);toast(asDraft?'Draft saved':'Claim '+nc.id+' submitted!');ss('empList','empHome');
}
function submitMgrClaim(){
  var desc=document.getElementById('f-desc'),amt=document.getElementById('f-amount'),dt=document.getElementById('f-date'),cat=document.getElementById('f-cat'),unit=document.getElementById('f-unit');
  if(!desc||!amt||!dt)return;
  var dv=desc.value,av=parseFloat(amt.value),dtv=dt.value,cv=cat?cat.value:'Other',uv=unit?unit.value:'';
  if(!dv||!av||!dtv){toast('Please fill all required fields');return;}
  var isCompany=mgrFormPayType==='company';
  var nc={id:(isCompany?'CO':'MGR')+'-2026-03-'+String(NN++).padStart(5,'0'),emp:isCompany?'':mgrFormEmp,unit:uv,category:cv,desc:dv,amount:av,date:dtv,status:isCompany?'Company-Paid':'Auto-Approved',rejectReason:'',slipRef:'',payType:mgrFormPayType,submittedBy:'manager'};
  claims.unshift(nc);toast(isCompany?'Recorded as Company-Paid':'Auto-approved for '+mgrFormEmp);
  mgrFormPayType='employee';mgrFormEmp='Ahmad Razif';ss('adminDash');
}

function render(){
  var ms=document.getElementById('ms'),tbt_el=document.getElementById('tbt'),bb_el=document.getElementById('bb'),tbr_el=document.getElementById('tbr'),nav=document.getElementById('nav'),lo=document.getElementById('lob');
  bb_el.style.display='none';tbr_el.style.display='none';nav.style.display='none';nav.innerHTML='';lo.style.display='none';

  function empNav(a){
    nav.style.display='flex';
    var its=[['home','⊞','Home',"ss('empHome')"],['claims','☰','Claims',"ss('empList','empHome')"],['new','＋','New',"ss('newClaim','empHome')"],['exit','⏏','Exit','logout()']];
    nav.innerHTML=its.map(function(x){return'<div class="ni'+(a===x[0]?' on':'')+'" onclick="'+x[3]+'"><span class="ni-ic" style="'+(x[0]==='new'?'color:#2563eb;font-size:16px;':'')+'">'+x[1]+'</span>'+x[2]+'</div>';}).join('');
  }
  function adminNav(a){
    nav.style.display='flex';
    var its=[['dash','⊞','Dash',"ss('adminDash')"],['list','☰','Claims',"ss('adminList','adminDash')"],['pay','💳','Pay',"ss('adminPay','adminDash')"],['emps','👥','Staff',"ss('adminEmployees','adminDash')"],['sub','＋','Submit',"ss('mgrNewClaim','adminDash')"]];
    nav.innerHTML=its.map(function(x){return'<div class="ni'+(a===x[0]?' on':'')+'" onclick="'+x[3]+'"><span class="ni-ic">'+x[1]+'</span>'+x[2]+'</div>';}).join('');
    lo.style.display='block';
  }

    var empCards=EMPS.map(function(emp){
      var bi=BANK_INFO[emp];var has=hasBankInfo(emp);var ini=initials(emp);
      return'<div class="emp-list-row" onclick="openBankEdit(\''+emp+'\')"><div class="avatar">'+ini+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#111">'+emp+'</div>'+(has?'<div style="font-size:11px;color:#6b7280">'+bi.bank+' · '+bi.acc+'</div>':'<div style="font-size:11px;color:#991b1b">No bank info — tap to add</div>')+'</div>'+(has?'<span style="color:#065f46;font-size:16px">✓</span>':'<span style="color:#991b1b;font-size:16px;font-weight:700">!</span>')+'</div>';
    }).join('');
    ms.innerHTML='<div class="scr">'+(missingCount?'<div class="info-box" style="background:#fee2e2"><div style="font-size:11px;color:#991b1b"><span style="font-weight:600">'+missingCount+' employee(s) missing bank info</span> — pay out blocked for them.</div></div>':'<div class="info-box" style="background:#d1fae5"><div style="font-size:11px;color:#065f46"><span style="font-weight:600">All employees have bank info saved.</span></div></div>')+'<div style="font-size:13px;font-weight:600;color:#111;margin-bottom:4px">Employees</div>'+empCards+'</div>';
  }
  else if(S==='bankEdit'){
    var emp=editingBankEmp;if(!emp){ss('adminEmployees');return;}
    var bi=BANK_INFO[emp]||{};var ini=initials(emp);
    tbt_el.textContent='Bank Info';bb_el.style.display='block';adminNav('emps');
    ms.innerHTML='<div class="scr"><div style="display:flex;align-items:center;gap:12px;background:#f9fafb;border-radius:12px;padding:12px;border:1px solid #e5e7eb"><div class="avatar" style="width:44px;height:44px;font-size:16px">'+ini+'</div><div><div style="font-size:15px;font-weight:600;color:#111">'+emp+'</div><div style="font-size:12px;color:#6b7280">Employee</div></div></div><div class="info-box" style="background:#dbeafe"><div style="font-size:11px;color:#1d4ed8">This bank info will be shown during pay out for accurate transfer.</div></div><div class="fg"><label class="fl">Bank name *</label><input class="fi" id="p-bank" value="'+(bi.bank||'')+'" placeholder="e.g. Maybank, CIMB, Public Bank"/></div><div class="fg"><label class="fl">Account number *</label><input class="fi" id="p-acc" value="'+(bi.acc||'')+'" placeholder="e.g. 1234 5678 9012"/></div><div class="fg"><label class="fl">Full name (as per bank) *</label><input class="fi" id="p-name" value="'+(bi.fullName||'')+'" placeholder="Full legal name"/></div><button class="pbtn btn-p" onclick="saveBankInfo()">Save Bank Info</button>'+(bi.bank?'<button class="pbtn btn-o" style="margin-top:6px" onclick="ss(\'adminEmployees\',\'adminDash\')">Cancel</button>':'')+'</div>';
  }
  else if(S==='adminPay'){
    tbt_el.textContent='Pay Out';bb_el.style.display='block';adminNav('pay');
    var appClaims=claims.filter(function(c){return c.status==='Approved'&&c.payType==='employee';});
    var selCount=Object.keys(checkedClaims).filter(function(k){return checkedClaims[k];}).length;
    var totalSel=appClaims.filter(function(c){return checkedClaims[c.id];}).reduce(function(s,c){return s+c.amount;},0);
    function toggleAll(emp){var ec=appClaims.filter(function(c){return c.emp===emp;});var allOn=ec.every(function(c){return checkedClaims[c.id];});ec.forEach(function(c){checkedClaims[c.id]=!allOn;});render();}
    function toggleExpand(emp){empExpandMap[emp]=!empExpandMap[emp];render();}
    window.toggleAll=toggleAll;window.toggleExpand=toggleExpand;
    var byEmpHTML='';
    EMPS.forEach(function(emp){
      var ec=appClaims.filter(function(c){return c.emp===emp;});if(!ec.length)return;
      var bi=BANK_INFO[emp];var hasBi=hasBankInfo(emp);
      var empTotal=ec.reduce(function(s,c){return s+c.amount;},0);
      var empSelTotal=ec.filter(function(c){return checkedClaims[c.id];}).reduce(function(s,c){return s+c.amount;},0);
      var allSel=ec.every(function(c){return checkedClaims[c.id];});
      var expanded=empExpandMap[emp]!==false;var ini=initials(emp);
      var claimRows=ec.map(function(c){var on=checkedClaims[c.id];return'<div class="ecr"><div class="chk'+(on?' on':'')+'" onclick="checkedClaims[\''+c.id+'\']='+(!on)+';render()">'+(on?'<span style="font-size:10px;color:#fff">✓</span>':'')+'</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.desc+'</div><div style="font-size:10px;color:#9ca3af;font-family:monospace">'+c.id+'</div></div><div style="font-size:12px;font-weight:600;flex-shrink:0;color:#111">RM '+c.amount.toFixed(2)+'</div></div>';}).join('');
      var bankSection=hasBi?'<div class="bank-card" style="margin:9px 0 6px"><div class="bk-row"><span class="bk-lbl">Bank</span><span class="bk-val">'+bi.bank+'</span></div><div class="bk-row"><span class="bk-lbl">Account no.</span><span class="bk-val mono">'+bi.acc+'</span></div><div class="bk-row"><span class="bk-lbl">Account name</span><span class="bk-val">'+bi.fullName+'</span></div></div>'+(empSelTotal>0?'<div class="transfer-summary" style="margin-bottom:9px"><span style="font-size:12px;color:#065f46;font-weight:600">Transfer amount</span><span style="font-size:15px;font-weight:700;color:#065f46">RM '+empSelTotal.toFixed(2)+'</span></div>':''):'<div class="no-bank" style="margin:9px 0 6px"><span style="font-weight:600">No bank info</span> — <span style="text-decoration:underline;cursor:pointer" onclick="openBankEdit(\''+emp+'\')">Add now</span></div>';
      byEmpHTML+='<div class="emp-pay-card"><div class="eph'+(expanded?'':' no-border')+'" onclick="toggleExpand(\''+emp+'\')"><div class="chk'+(allSel?' on':'')+'" onclick="event.stopPropagation();toggleAll(\''+emp+'\')">'+(allSel?'<span style="font-size:10px;color:#fff">✓</span>':'')+'</div><div class="avatar">'+ini+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#111">'+emp+'</div>'+(hasBi?'<div style="font-size:11px;color:#6b7280">'+bi.bank+' · '+bi.acc+'</div>':'<div style="font-size:11px;color:#991b1b">No bank info</div>')+'</div><div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:600;color:#111">RM '+empTotal.toFixed(2)+'</div><div style="font-size:10px;color:#6b7280">'+ec.length+' claim(s)</div></div><span style="font-size:11px;color:#9ca3af;margin-left:6px">'+(expanded?'▲':'▼')+'</span></div>'+(expanded?'<div style="padding:0 12px 4px">'+bankSection+claimRows+'</div>':'')+'</div>';
    });
    var allRows=appClaims.map(function(c){var on=checkedClaims[c.id];return'<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6"><div class="chk'+(on?' on':'')+'" onclick="checkedClaims[\''+c.id+'\']='+(!on)+';render()">'+(on?'<span style="font-size:10px;color:#fff">✓</span>':'')+'</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#111">'+c.desc+'</div><div style="font-size:10px;color:#9ca3af;font-family:monospace">'+c.id+' · '+c.emp.split(' ')[0]+'</div></div><div style="font-size:12px;font-weight:600;flex-shrink:0;color:#111">RM '+c.amount.toFixed(2)+'</div></div>';}).join('');
    ms.innerHTML='<div class="scr"><div class="tab-bar"><div class="tab-opt'+(payTab==='byEmp'?' on':'')+'" onclick="payTab=\'byEmp\';render()">By employee</div><div class="tab-opt'+(payTab==='all'?' on':'')+'" onclick="payTab=\'all\';render()">All claims</div></div>'+(appClaims.length===0?'<div style="text-align:center;padding:20px;font-size:12px;color:#6b7280">No approved claims pending</div>':payTab==='byEmp'?(byEmpHTML||'<div style="text-align:center;padding:20px;font-size:12px;color:#6b7280">No approved claims</div>'):'<div style="background:#f9fafb;border-radius:12px;padding:0 12px;border:1px solid #e5e7eb">'+(allRows||'')+'</div>')+'<div style="background:#f9fafb;border-radius:12px;padding:11px;border:1px solid #e5e7eb;margin-top:4px"><div style="font-size:12px;font-weight:600;color:#111;margin-bottom:7px">Upload bank transfer slip</div>'+(slipUploaded?'<div class="slip-box"><span>✅</span><span style="font-size:12px;color:#92400e;font-weight:600;margin-left:6px">transfer_slip.pdf uploaded</span></div>':'<div class="up-box" onclick="slipUploaded=true;render()"><div style="font-size:20px">📄</div><div style="font-size:12px;color:#6b7280;margin-top:3px">Tap to upload bank transfer slip</div></div>')+'</div><div style="background:#f9fafb;border-radius:12px;padding:11px;border:1px solid #e5e7eb;margin-top:4px"><div class="sum-row"><span style="color:#6b7280">Selected</span><span>'+selCount+' claim(s)</span></div><div class="sum-row"><span style="color:#6b7280">Total payout</span><span>RM '+totalSel.toFixed(2)+'</span></div></div><button class="pbtn btn-w" style="margin-top:4px" onclick="markClaimed()">Mark as Claimed</button></div>';
  }
  else if(S==='mgrNewClaim'){
    tbt_el.textContent='Submit Expense';bb_el.style.display='block';adminNav('sub');
    var isCompany=mgrFormPayType==='company';
    var empOpts=EMPS.map(function(e){return'<option value="'+e+'"'+(mgrFormEmp===e?' selected':'')+'>'+e+'</option>';}).join('');
    var catOpts=CATS.map(function(c){return'<option>'+c+'</option>';}).join('');
    var unitOpts=UNITS.map(function(u){return'<option>'+u+'</option>';}).join('');
    ms.innerHTML='<div class="scr"><div style="display:flex;flex-direction:column;gap:7px"><div class="ptype-card'+(isCompany?'':' on')+'" onclick="mgrFormPayType=\'employee\';render()"><div style="font-size:20px">👤</div><div><div class="ptype-title">Employee paid</div><div class="ptype-desc">Needs reimbursement — auto-approved</div></div></div><div class="ptype-card'+(isCompany?' on':'')+'" onclick="mgrFormPayType=\'company\';render()"><div style="font-size:20px">🏢</div><div><div class="ptype-title">Company paid</div><div class="ptype-desc">No reimbursement — tracking only</div></div></div></div>'+(isCompany?'<div class="info-box" style="background:#d1fae5"><div style="font-size:11px;color:#065f46"><span style="font-weight:600">Company-paid:</span> No employee assigned.</div></div>':'<div class="fg"><label class="fl">Submit for employee *</label><select class="fi" id="f-emp" onchange="mgrFormEmp=this.value">'+empOpts+'</select></div>')+'<div class="fg"><label class="fl">Category *</label><select class="fi" id="f-cat">'+catOpts+'</select></div><div class="fg"><label class="fl">Unit / location *</label><select class="fi" id="f-unit"><option value="">— Select unit —</option>'+unitOpts+'</select></div><div class="fg"><label class="fl">Description *</label><input class="fi" id="f-desc" placeholder="e.g. TNB Bill March"/></div><div class="tcol"><div class="fg"><label class="fl">Amount (RM) *</label><input class="fi" id="f-amount" type="number" placeholder="0.00"/></div><div class="fg"><label class="fl">Date *</label><input class="fi" id="f-date" type="date"/></div></div><div class="up-box" onclick="toast(\'Camera unavailable in demo\')"><div style="font-size:20px">📷</div><div style="font-size:12px;color:#6b7280;margin-top:3px">Tap to upload receipt</div></div><button class="pbtn '+(isCompany?'btn-s':'btn-p')+'" onclick="submitMgrClaim()">'+(isCompany?'Record as Company-Paid':'Submit (Auto-Approved)')+'</button></div>';
  }
}

window.viewClaim=function(i,p){SEL=claims[i];ss('claimDetail',p);};
window.adminView=function(i,p){SEL=claims[i];ss('adminReview',p);};
window.startEmpEdit=function(id){editingId=id;ss('empEdit','claimDetail');};
window.openBankEdit=function(emp){editingBankEmp=emp;ss('bankEdit','adminEmployees');};
window.goBack=goBack;window.loginAs=loginAs;window.logout=logout;
window.doApprove=function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit');
  if(!cat||!cat.value){toast('Please assign a category');return;}
  if(!unit||!unit.value){toast('Please assign a unit');return;}
  approveClaim(SEL.id,cat.value,unit.value);
};
window.doReject=function(){var r=document.getElementById('rv-reason');rejectClaim(SEL.id,r?r.value:'No reason given');};
window.saveMgrEdit=saveMgrEdit;window.saveEmpEdit=saveEmpEdit;window.submitEmpEdit=submitEmpEdit;
window.submitNewClaim=submitNewClaim;window.submitMgrClaim=submitMgrClaim;
window.markClaimed=markClaimed;window.saveBankInfo=saveBankInfo;
window.mgrChangeToReject=function(){
  var amt=document.getElementById('rv-amt');if(amt&&amt.value)SEL.amount=parseFloat(amt.value);
  SEL.status='Rejected';SEL.rejectReason='Decision revised by manager';
  toast('Changed to Rejected');editingId=null;ss('adminList','adminDash');
};
window.mgrChangeToApprove=function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit'),amt=document.getElementById('rv-amt');
  if(cat&&cat.value)SEL.category=cat.value;if(unit&&unit.value)SEL.unit=unit.value;if(amt&&amt.value)SEL.amount=parseFloat(amt.value);
  SEL.status='Approved';SEL.rejectReason='';
  toast('Changed to Approved');editingId=null;ss('adminList','adminDash');
};
render();
</script>
</body>
</html>
