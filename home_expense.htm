// ===== STATE =====
var R=null,S='auth',PS=null,SEL=null,editingId=null,payTab='byEmp';

var MONTHS={'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};

var CAT_COLORS={'Utilities':'#185FA5','Maintenance & Repair':'#854F0B','Housekeeping & Cleaning':'#3B6D11','Laundry':'#534AB7','Daily Products':'#0F6E56','Hospitality Items':'#993556','Electrical & Unit Setup':'#993C1D','Office Expenses':'#5F5E5A','Employee Welfare':'#185FA5','Outsource Cleaning Staff':'#854F0B','Unit Renovation':'#A32D2D','Other':'#888780'};

// ===== SUPABASE DATA FUNCTIONS =====
async function loadClaims(){
  var q=sb.from('claims').select('*').order('created_at',{ascending:false});
  var{data,error}=await q;
  if(error){console.error('loadClaims:',error);return;}
  claims=data.map(function(r){return{id:r.claim_id,uid:r.id,emp:r.emp||'',unit:r.unit||'',category:r.category||'',desc:r.description,amount:parseFloat(r.amount),date:r.date,status:r.status,rejectReason:r.reject_reason||'',slipRef:r.slip_ref||'',payType:r.pay_type,submittedBy:r.submitted_by};});
}
async function loadBankInfo(){
  var{data,error}=await sb.from('bank_info').select('*');
  if(error){console.error('loadBankInfo:',error);return;}
  BANK_INFO={};data.forEach(function(r){BANK_INFO[r.employee_name]={bank:r.bank||'',acc:r.acc||'',fullName:r.full_name||''};});
  EMPS=Object.keys(BANK_INFO);
    // Build active employees list (exclude deactivated and admin)
    var{data:profs}=await sb.from('profiles').select('full_name,active,role');
    var inactiveNames={};var adminNames={};
    if(profs)profs.forEach(function(p){if(p.active===false)inactiveNames[p.full_name]=true;if(p.role==='admin')adminNames[p.full_name]=true;});
    ACTIVE_EMPS=EMPS.filter(function(e){return!inactiveNames[e]&&!adminNames[e];});
  if(mgrFormEmp===''&&ACTIVE_EMPS.length)mgrFormEmp=ACTIVE_EMPS[0];
}
async function loadAll(){await loadClaims();await loadBankInfo();}

async function getNextClaimId(prefix){
  var now=new Date();var yr=now.getFullYear();
  var ym=yr+'-'+String(now.getMonth()+1).padStart(2,'0');
  var{data,error}=await sb.from('claim_sequences').select('last_number').eq('year',yr).single();
  var n;
  if(error||!data){
    n=1;
    await sb.from('claim_sequences').upsert({year:yr,last_number:1},{onConflict:'year'});
  } else {
    n=data.last_number+1;
    await sb.from('claim_sequences').update({last_number:n}).eq('year',yr);
  }
  return prefix+'-'+ym+'-'+String(n).padStart(5,'0');
}

async function dbInsertClaim(c){
  var{error}=await sb.from('claims').insert({claim_id:c.id,emp:c.emp,unit:c.unit,category:c.category,description:c.desc,amount:c.amount,date:c.date,status:c.status,reject_reason:c.rejectReason,slip_ref:c.slipRef,pay_type:c.payType,submitted_by:c.submittedBy,created_by:currentUser.id});
  if(error)console.error('dbInsertClaim:',error);
  return !error;
}
async function dbUpdateClaim(claimId,fields){
  var upd={updated_at:new Date().toISOString()};
  if(fields.desc!==undefined)upd.description=fields.desc;
  if(fields.amount!==undefined)upd.amount=fields.amount;
  if(fields.date!==undefined)upd.date=fields.date;
  if(fields.status!==undefined)upd.status=fields.status;
  if(fields.category!==undefined)upd.category=fields.category;
  if(fields.unit!==undefined)upd.unit=fields.unit;
  if(fields.rejectReason!==undefined)upd.reject_reason=fields.rejectReason;
  if(fields.slipRef!==undefined)upd.slip_ref=fields.slipRef;
  var{error}=await sb.from('claims').update(upd).eq('claim_id',claimId);
  if(error)console.error('dbUpdateClaim:',error);
  return !error;
}
async function dbUpdateBankInfo(empName,bank,acc,fullName){
  var{error}=await sb.from('bank_info').update({bank:bank,acc:acc,full_name:fullName,updated_at:new Date().toISOString()}).eq('employee_name',empName);
  if(error)console.error('dbUpdateBankInfo:',error);
  return !error;
}

// ===== AUTH FUNCTIONS =====
async function doLogin(){
  var user=document.getElementById('auth-user'),pw=document.getElementById('auth-pw');
  if(!user||!pw||!user.value||!pw.value){authError='Please fill all fields';render();return;}
  authLoading=true;authError='';render();
  var email=user.value.toLowerCase().trim()+'@homestay.app';
  var{data,error}=await sb.auth.signInWithPassword({email:email,password:pw.value});
  authLoading=false;
  if(error){authError='Invalid username or password';render();return;}
  await initSession(data.user);
}
async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;R=null;S='auth';PS=null;claims=[];BANK_INFO={};EMPS=[];ACTIVE_EMPS=[];
  isSystemAdmin=false;allUsers=[];editingUser=null;userFormError='';
  render();
}
async function initSession(user){
  currentUser=user;
  var{data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!prof){authLoading=false;authError='Profile not found. Contact admin.';S='auth';render();return;}
  if(prof.active===false){authLoading=false;authError='Your account has been deactivated. Contact admin.';await sb.auth.signOut();S='auth';render();return;}
  currentProfile=prof;
  isSystemAdmin=prof.role==='admin';
  R=(prof.role==='admin'||prof.role==='manager')?'admin':'employee';
  await loadAll();
  setupRealtime();
  authLoading=false;
  S=isSystemAdmin?'adminUsers':R==='admin'?'adminDash':'empHome';
  render();
}

// ===== USER MANAGEMENT (Admin only, uses Admin API) =====
var adminHeaders={'apikey':SUPABASE_SERVICE_KEY,'Authorization':'Bearer '+SUPABASE_SERVICE_KEY,'Content-Type':'application/json'};

async function openUsersScreen(){
  await loadUsers();
  ss('adminUsers','adminDash');
}
async function loadUsers(){
  if(!isSystemAdmin)return;
  var r=await fetch(SUPABASE_URL+'/rest/v1/profiles?select=*&order=created_at',{headers:adminHeaders});
  if(r.ok){allUsers=await r.json();}
  else{console.error('loadUsers:',await r.text());}
}
async function createUserAccount(){
  var u=document.getElementById('uf-user'),p=document.getElementById('uf-pw'),n=document.getElementById('uf-name'),r=document.getElementById('uf-role');
  if(!u||!p||!n||!r||!u.value.trim()||!p.value||!n.value.trim()){userFormError='Please fill all fields';render();return;}
  if(p.value.length<6){userFormError='Password must be at least 6 characters';render();return;}
  var username=u.value.trim().toLowerCase();
  var email=username+'@homestay.app';
  var fullName=n.value.trim();
  var role=r.value;
  // 1. Create auth user via Admin API
  var r1=await fetch(SUPABASE_URL+'/auth/v1/admin/users',{
    method:'POST',headers:adminHeaders,
    body:JSON.stringify({email:email,password:p.value,email_confirm:true,user_metadata:{full_name:fullName}})
  });
  var d1=await r1.json();
  if(!r1.ok||!d1.id){userFormError=d1.msg||d1.message||'Failed to create user';render();return;}
  // 2. Create profile
  var r2=await fetch(SUPABASE_URL+'/rest/v1/profiles',{
    method:'POST',headers:{...adminHeaders,'Prefer':'return=minimal'},
    body:JSON.stringify({id:d1.id,email:email,full_name:fullName,role:role})
  });
  if(!r2.ok){userFormError='User created but profile failed';render();return;}
  // 3. Create bank_info for employees
  if(role==='employee'){
    await fetch(SUPABASE_URL+'/rest/v1/bank_info',{
      method:'POST',headers:{...adminHeaders,'Prefer':'return=minimal'},
      body:JSON.stringify({employee_name:fullName})
    }).catch(function(){});
  }
  userFormError='';
  await loadUsers();await loadBankInfo();
  toast('Account created: @'+username);
  ss('adminUsers','adminDash');
}
async function updateUserAccount(){
  if(!editingUser)return;
  var n=document.getElementById('uf-name'),r=document.getElementById('uf-role'),p=document.getElementById('uf-pw');
  if(!n||!n.value.trim()){userFormError='Name is required';render();return;}
  if(p&&p.value&&p.value.length<6){userFormError='Password must be at least 6 characters';render();return;}
  var fullName=n.value.trim();
  var role=r?r.value:editingUser.role;
  var oldName=editingUser.full_name;
  // 1. Update profile
  await fetch(SUPABASE_URL+'/rest/v1/profiles?id=eq.'+editingUser.id,{
    method:'PATCH',headers:{...adminHeaders,'Prefer':'return=minimal'},
    body:JSON.stringify({full_name:fullName,role:role})
  });
  // 2. Update bank_info name if changed
  if(fullName!==oldName){
    await fetch(SUPABASE_URL+'/rest/v1/bank_info?employee_name=eq.'+encodeURIComponent(oldName),{
      method:'PATCH',headers:{...adminHeaders,'Prefer':'return=minimal'},
      body:JSON.stringify({employee_name:fullName})
    });
  }
  // 3. Update password if provided
  if(p&&p.value){
    await fetch(SUPABASE_URL+'/auth/v1/admin/users/'+editingUser.id,{
      method:'PUT',headers:adminHeaders,
      body:JSON.stringify({password:p.value})
    });
  }
  userFormError='';editingUser=null;
  await loadUsers();await loadBankInfo();
  toast('Account updated');
  ss('adminUsers','adminDash');
}
async function deleteUserAccount(userId,name){
  if(!confirm('Deactivate account: '+name+'?\nUser will not be able to login.')){return;}
  var r=await fetch(SUPABASE_URL+'/rest/v1/profiles?id=eq.'+userId,{
    method:'PATCH',headers:{...adminHeaders,'Prefer':'return=minimal'},
    body:JSON.stringify({active:false})
  });
  if(!r.ok){toast('Error: Deactivate failed');return;}
  await loadUsers();
  toast('Account deactivated: '+name);
  render();
}
async function reactivateUser(userId,name){
  if(!confirm('Reactivate account: '+name+'?')){return;}
  var r=await fetch(SUPABASE_URL+'/rest/v1/profiles?id=eq.'+userId,{
    method:'PATCH',headers:{...adminHeaders,'Prefer':'return=minimal'},
    body:JSON.stringify({active:true})
  });
  if(!r.ok){toast('Error: Reactivate failed');return;}
  await loadUsers();
  toast('Account reactivated: '+name);
  render();
}

// ===== REALTIME =====
var realtimeSub=null;
function setupRealtime(){
  if(realtimeSub)realtimeSub.unsubscribe();
  realtimeSub=sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'claims'},async function(){await loadClaims();render();})
    .on('postgres_changes',{event:'*',schema:'public',table:'bank_info'},async function(){await loadBankInfo();render();})
    .subscribe();
}

// ===== HELPERS =====
function isPaidOut(c){return c.status==='Claimed'||c.status==='Company-Paid';}
function empCanEdit(c){return(c.status==='Submitted'||c.status==='Draft'||c.status==='Auto-Approved')&&!isPaidOut(c);}
function mgrCanEdit(c){return(c.status==='Approved'||c.status==='Rejected'||c.status==='Auto-Approved')&&!isPaidOut(c);}
function initials(n){var p=n.split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function hasBankInfo(emp){var b=BANK_INFO[emp];return b&&b.bank&&b.acc&&b.fullName;}
function dstat(s){return R!=='admin'&&s==='Auto-Approved'?'Approved':s;}
function myName(){return currentProfile?currentProfile.full_name:'';}

function sbadge(s){
  var m={Submitted:'b-sub',Approved:'b-appr',Rejected:'b-rej',Draft:'b-draft',Claimed:'b-claimed','Auto-Approved':'b-auto','Company-Paid':'b-copay'};
  return '<span class="badge '+(m[s]||'b-draft')+'"><span class="bd"></span>'+s+'</span>';
}
function ccCard(c,fn){
  var byTag=c.submittedBy==='manager'?'<span style="font-size:9px;color:#6b7280;background:#f3f4f6;border-radius:99px;padding:1px 4px;border:1px solid #e5e7eb;margin-left:3px">mgr</span>':'';
  var unitTag=c.unit?'<span style="font-size:9px;background:#f3f4f6;color:#6b7280;border-radius:99px;padding:1px 5px;border:1px solid #e5e7eb">'+c.unit+'</span>':'';
  return '<div class="cc" onclick="'+fn+'"><div style="flex:1;min-width:0"><div class="cc-id">'+c.id+'</div><div class="cc-desc">'+c.desc+'</div><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px">'+(c.category?'<span style="font-size:10px;color:#6b7280">'+c.category+'</span>':'<span style="font-size:10px;color:#9ca3af;font-style:italic">No category</span>')+(R==='admin'&&c.emp?'<span style="font-size:10px;color:#9ca3af">· '+c.emp.split(' ')[0]+'</span>'+byTag:'')+unitTag+'</div></div><div class="cc-r"><div class="cc-amt">RM '+c.amount.toFixed(2)+'</div>'+sbadge(dstat(c.status))+'</div></div>';
}

function togglePayType(t){

window.togglePayType=togglePayType;
function pickReceipt(){
  var inp=document.getElementById('receipt-input');
  if(!inp){inp=document.createElement('input');inp.type='file';inp.id='receipt-input';inp.accept='image/*,.pdf,.doc,.docx';inp.style.display='none';inp.setAttribute('capture','environment');inp.setAttribute('multiple','multiple');document.body.appendChild(inp);}
  inp.value='';
  inp.onchange=function(){
    if(inp.files&&inp.files.length){
      for(var i=0;i<inp.files.length;i++){pendingFiles.push(inp.files[i]);pendingFileNames.push(inp.files[i].name);}
      var rbox=document.getElementById('rbox');
      if(rbox)rbox.innerHTML=receiptBox('');
    }
  };
  inp.click();
}
function removePendingFile(idx){
  pendingFiles.splice(idx,1);pendingFileNames.splice(idx,1);
  var rbox=document.getElementById('rbox');
  if(rbox)rbox.innerHTML=receiptBox('');
}
window.removePendingFile=removePendingFile;
async function uploadAllFiles(claimId){
  if(!pendingFiles.length)return '';
  var urls=[];
  for(var i=0;i<pendingFiles.length;i++){
    var f=pendingFiles[i];
    var ext=f.name.split('.').pop().toLowerCase();
    var path='receipts/'+claimId+'/receipt_'+Date.now()+'_'+i+'.'+ext;
    var res=await sb.storage.from('receipts').upload(path,f,{upsert:true});
    if(res.error){console.error('Upload error:',res.error);toast('Upload failed: '+f.name);continue;}
    var{data:urlData}=sb.storage.from('receipts').getPublicUrl(path);
    if(urlData.publicUrl)urls.push(urlData.publicUrl);
  }
  pendingFiles=[];pendingFileNames=[];
  return urls.join(',');
}
function receiptBox(existingUrl){
  var html='';
  var existingUrls=existingUrl?existingUrl.split(',').filter(function(u){return u.trim();}):[];
  if(existingUrls.length){
    html+='<div style="margin:4px 0;display:flex;flex-direction:column;gap:4px">';
    existingUrls.forEach(function(u,i){
      var name=decodeURIComponent(u.split('/').pop()).replace(/^receipt_/,'');
      var isImg=/\.(jpg|jpeg|png|gif|webp|heic)$/i.test(name);
      html+='<a href="'+u.trim()+'" target="_blank" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0fdf4;border:1px dashed #059669;border-radius:10px;text-decoration:none"><span style="font-size:16px">'+(isImg?'🖼️':'📄')+'</span><span style="font-size:11px;color:#059669;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">File '+(i+1)+'</span><span style="font-size:10px;color:#6b7280">View →</span></a>';
    });
    html+='</div>';
  }
  if(pendingFileNames.length){
    html+='<div style="margin:4px 0;display:flex;flex-direction:column;gap:4px">';
    pendingFileNames.forEach(function(n,i){
      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0fdf4;border:1px solid #059669;border-radius:10px"><span style="font-size:16px">✅</span><span style="font-size:11px;color:#059669;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+n+'</span><span onclick="removePendingFile('+i+')" style="font-size:14px;color:#991b1b;cursor:pointer;padding:2px 6px">✕</span></div>';
    });
    html+='</div>';
  }
  html+='<div class="up-box" onclick="pickReceipt()"><div style="font-size:20px">'+(existingUrls.length||pendingFileNames.length?'➕':'📷')+'</div><div style="font-size:12px;color:#6b7280;margin-top:3px">'+(existingUrls.length||pendingFileNames.length?'Add more files':'Tap to upload receipt')+'</div><div style="font-size:10px;color:#9ca3af">Photos, images or documents</div></div>';
  return html;
}
window.pickReceipt=pickReceipt;

function filterClaims(list,st,mo,yr,em){
  return list.filter(function(c){
    if(st&&st!=='All'){var cs=R!=='admin'?dstat(c.status):c.status;if(cs!==st)return false;}
    if(mo&&mo!=='All'&&c.date.slice(5,7)!==mo)return false;
    if(yr&&yr!=='All'&&c.date.slice(0,4)!==yr)return false;
    if(em&&em!=='All'&&c.emp!==em)return false;
    return true;
  });
}

async function markClaimed(){
  var ids=Object.keys(checkedClaims).filter(function(k){return checkedClaims[k];});
  if(!slipFiles.length){toast('Please upload bank slip first');return;}
  if(!ids.length){toast('Select at least one claim');return;}
  var batchId='BATCH-'+Date.now();
  toast('Uploading slips...');
  var slipUrls=await uploadAllSlips(batchId);
  if(!slipUrls){toast('Slip upload failed');return;}
  for(var i=0;i<ids.length;i++){await dbUpdateClaim(ids[i],{status:'Claimed',slipRef:slipUrls});}
  checkedClaims={};slipFiles=[];slipFileNames=[];
  await loadClaims();toast(ids.length+' claim(s) marked as Claimed');ss('adminDash');
}

  else if(S==='adminPay'){

    var totalSel=appClaims.filter(function(c){return checkedClaims[c.id];}).reduce(function(s,c){return s+c.amount;},0);

    window.toggleAll=toggleAll;window.toggleExpand=toggleExpand;
    var byEmpHTML='';
    EMPS.forEach(function(emp){
      var ec=appClaims.filter(function(c){return c.emp===emp;});if(!ec.length)return;

      var expanded=empExpandMap[emp]!==false;var ini=initials(emp);
      var claimRows=ec.map(function(c){var on=checkedClaims[c.id];return'<div class="ecr"><div class="chk'+(on?' on':'')+'" onclick="checkedClaims[\''+c.id+'\']='+(!on)+';render()">'+(on?'<span style="font-size:10px;color:#fff">✓</span>':'')+'</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.desc+'</div><div style="font-size:10px;color:#9ca3af;font-family:monospace">'+c.id+'</div></div><div style="font-size:12px;font-weight:600;flex-shrink:0;color:#111">RM '+c.amount.toFixed(2)+'</div></div>';}).join('');
      var bankSection=hasBi?'<div class="bank-card" style="margin:9px 0 6px"><div class="bk-row"><span class="bk-lbl">Bank</span><span class="bk-val">'+bi.bank+'</span></div><div class="bk-row"><span class="bk-lbl">Account no.</span><span class="bk-val mono">'+bi.acc+'</span></div><div class="bk-row"><span class="bk-lbl">Account name</span><span class="bk-val">'+bi.fullName+'</span></div></div>'+(empSelTotal>0?'<div class="transfer-summary" style="margin-bottom:9px"><span style="font-size:12px;color:#065f46;font-weight:600">Transfer amount</span><span style="font-size:15px;font-weight:700;color:#065f46">RM '+empSelTotal.toFixed(2)+'</span></div>':''):'<div class="no-bank" style="margin:9px 0 6px"><span style="font-weight:600">No bank info</span> — <span style="text-decoration:underline;cursor:pointer" onclick="openBankEdit(\''+emp+'\')">Add now</span></div>';
      byEmpHTML+='<div class="emp-pay-card"><div class="eph'+(expanded?'':' no-border')+'" onclick="toggleExpand(\''+emp+'\')"><div class="chk'+(allSel?' on':'')+'" onclick="event.stopPropagation();toggleAll(\''+emp+'\')">'+(allSel?'<span style="font-size:10px;color:#fff">✓</span>':'')+'</div><div class="avatar">'+ini+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#111">'+emp+'</div>'+(hasBi?'<div style="font-size:11px;color:#6b7280">'+bi.bank+' · '+bi.acc+'</div>':'<div style="font-size:11px;color:#991b1b">No bank info</div>')+'</div><div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:600;color:#111">RM '+empTotal.toFixed(2)+'</div><div style="font-size:10px;color:#6b7280">'+ec.length+' claim(s)</div></div><span style="font-size:11px;color:#9ca3af;margin-left:6px">'+(expanded?'▲':'▼')+'</span></div>'+(expanded?'<div style="padding:0 12px 4px">'+bankSection+claimRows+'</div>':'')+'</div>';
    });
    var allRows=appClaims.map(function(c){var on=checkedClaims[c.id];return'<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6"><div class="chk'+(on?' on':'')+'" onclick="checkedClaims[\''+c.id+'\']='+(!on)+';render()">'+(on?'<span style="font-size:10px;color:#fff">✓</span>':'')+'</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:#111">'+c.desc+'</div><div style="font-size:10px;color:#9ca3af;font-family:monospace">'+c.id+' · '+c.emp.split(' ')[0]+'</div></div><div style="font-size:12px;font-weight:600;flex-shrink:0;color:#111">RM '+c.amount.toFixed(2)+'</div></div>';}).join('');
    ms.innerHTML='<div class="scr"><div class="tab-bar"><div class="tab-opt'+(payTab==='byEmp'?' on':'')+'" onclick="payTab=\'byEmp\';render()">By employee</div><div class="tab-opt'+(payTab==='all'?' on':'')+'" onclick="payTab=\'all\';render()">All claims</div></div>'+(appClaims.length===0?'<div style="text-align:center;padding:20px;font-size:12px;color:#6b7280">No approved claims pending</div>':payTab==='byEmp'?(byEmpHTML||'<div style="text-align:center;padding:20px;font-size:12px;color:#6b7280">No approved claims</div>'):'<div style="background:#f9fafb;border-radius:12px;padding:0 12px;border:1px solid #e5e7eb">'+(allRows||'')+'</div>')+'<div style="background:#f9fafb;border-radius:12px;padding:11px;border:1px solid #e5e7eb;margin-top:4px"><div style="font-size:12px;font-weight:600;color:#111;margin-bottom:7px">Upload bank transfer slip</div>'+slipBox()+'</div><div style="background:#f9fafb;border-radius:12px;padding:11px;border:1px solid #e5e7eb;margin-top:4px"><div class="sum-row"><span style="color:#6b7280">Selected</span><span>'+selCount+' claim(s)</span></div><div class="sum-row"><span style="color:#6b7280">Total payout</span><span>RM '+totalSel.toFixed(2)+'</span></div></div><button class="pbtn btn-w" style="margin-top:4px" onclick="markClaimed()">Mark as Claimed</button></div>';
  }
  else if(S==='adminUsers'){
    tbt_el.textContent='Manage Users';bb_el.style.display='block';adminNav('dash');
    var userCards=allUsers.map(function(u){
      var ini=initials(u.full_name);
      var roleTag=u.role==='admin'?'<span style="font-size:10px;color:#1d4ed8;background:#dbeafe;padding:1px 6px;border-radius:99px">Admin</span>':u.role==='manager'?'<span style="font-size:10px;color:#065f46;background:#d1fae5;padding:1px 6px;border-radius:99px">Manager</span>':'<span style="font-size:10px;color:#6b7280;background:#f3f4f6;padding:1px 6px;border-radius:99px">Employee</span>';
      var username=u.email.replace('@homestay.app','');
      var isActive=u.active!==false;
      var actions=u.role!=='admin'?'<div style="display:flex;gap:8px;margin-top:3px"><span style="font-size:11px;color:#2563eb;cursor:pointer;text-decoration:underline" onclick="event.stopPropagation();editUser(\''+u.id+'\')">Edit</span>'+(isActive?'<span style="font-size:11px;color:#991b1b;cursor:pointer;text-decoration:underline" onclick="event.stopPropagation();deleteUserAccount(\''+u.id+'\',\''+u.full_name.replace(/'/g,"\\'")+'\')">Deactivate</span>':'<span style="font-size:11px;color:#059669;cursor:pointer;text-decoration:underline" onclick="event.stopPropagation();reactivateUser(\''+u.id+'\',\''+u.full_name.replace(/'/g,"\\'")+'\')">Reactivate</span>')+'</div>':'';
      var statusTag=!isActive?'<span style="font-size:9px;color:#991b1b;background:#fee2e2;padding:1px 5px;border-radius:99px;margin-left:4px">Inactive</span>':'';
      return '<div class="emp-list-row"'+(isActive?'':' style="opacity:0.5"')+'><div class="avatar">'+ini+'</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><div style="font-size:13px;font-weight:600;color:#111">'+u.full_name+'</div>'+roleTag+statusTag+'</div><div style="font-size:11px;color:#9ca3af;font-family:monospace">@'+username+'</div>'+actions+'</div></div>';
    }).join('');
    ms.innerHTML='<div class="scr"><div class="info-box" style="background:#dbeafe"><div style="font-size:11px;color:#1d4ed8"><span style="font-weight:600">'+allUsers.length+' user(s)</span> in the system. Only admin can manage accounts.</div></div>'+userCards+'<button class="pbtn btn-p" onclick="editingUser=null;userFormError=\'\';ss(\'userForm\',\'adminUsers\')">+ Add New User</button></div>';
  }
  else if(S==='userForm'){
    tbt_el.textContent=editingUser?'Edit User':'Add User';bb_el.style.display='block';adminNav('dash');
    var isEditing=!!editingUser;
    ms.innerHTML='<div class="scr">'+(userFormError?'<div style="background:#fee2e2;color:#991b1b;font-size:12px;padding:8px 12px;border-radius:8px;text-align:center">'+userFormError+'</div>':'')+(isEditing?'<div class="info-box" style="background:#fef3c7"><div style="font-size:11px;color:#92400e"><span style="font-weight:600">Editing:</span> '+editingUser.full_name+' (@'+editingUser.email.replace('@homestay.app','')+')</div></div>':'<div class="info-box" style="background:#dbeafe"><div style="font-size:11px;color:#1d4ed8">The username will be used for login. Example: username <b>ahmad</b> → login as <b>ahmad</b>.</div></div>')+(isEditing?'':'<div class="fg"><label class="fl">Username *</label><input class="fi" id="uf-user" placeholder="e.g. ahmad" autocapitalize="off"/></div>')+'<div class="fg"><label class="fl">Full name *</label><input class="fi" id="uf-name" value="'+(isEditing?editingUser.full_name:'')+'"/></div><div class="fg"><label class="fl">Role *</label><select class="fi" id="uf-role"><option value="employee"'+(isEditing&&editingUser.role==='employee'?' selected':'')+'>Employee</option><option value="manager"'+(isEditing&&editingUser.role==='manager'?' selected':'')+'>Manager</option></select></div><div class="fg"><label class="fl">Password '+(isEditing?'(leave blank to keep current)':'*')+'</label><input class="fi" id="uf-pw" type="password" placeholder="Min 6 characters"/></div><button class="pbtn btn-s" onclick="'+(isEditing?'updateUserAccount()':'createUserAccount()')+'">'+(isEditing?'Save Changes':'Create Account')+'</button><button class="pbtn btn-o" style="margin-top:6px" onclick="editingUser=null;userFormError=\'\';ss(\'adminUsers\',\'adminDash\')">Cancel</button></div>';
  }
  else if(S==='mgrNewClaim'){
    tbt_el.textContent='Submit Expense';bb_el.style.display='block';adminNav('sub');
    var isCompany=mgrFormPayType==='company';
      var mySelf=myName();var empDropList=(!isSystemAdmin&&ACTIVE_EMPS.indexOf(mySelf)<0)?[mySelf].concat(ACTIVE_EMPS):ACTIVE_EMPS;
    var empOpts=empDropList.map(function(e){return'<option value="'+e+'"'+(mgrFormEmp===e?' selected':'')+'>'+e+(e===mySelf?' (self)':'')+'</option>';}).join('');
    var catOpts=CATS.map(function(c){return'<option>'+c+'</option>';}).join('');
    var unitOpts=UNITS.map(function(u){return'<option>'+u+'</option>';}).join('');
    var today=new Date().toISOString().slice(0,10);
    ms.innerHTML='<div class="scr"><div style="display:flex;flex-direction:column;gap:7px"><div class="ptype-card'+(isCompany?'':' on')+'" onclick="togglePayType(\'employee\')"><div style="font-size:20px">👤</div><div><div class="ptype-title">Employee paid</div><div class="ptype-desc">Needs reimbursement — auto-approved</div></div></div><div class="ptype-card'+(isCompany?' on':'')+'" onclick="togglePayType(\'company\')"><div style="font-size:20px">🏢</div><div><div class="ptype-title">Company paid</div><div class="ptype-desc">No reimbursement — tracking only</div></div></div></div>'+(isCompany?'<div class="info-box" style="background:#d1fae5"><div style="font-size:11px;color:#065f46"><span style="font-weight:600">Company-paid:</span> No employee assigned.</div></div>':'<div class="fg"><label class="fl">Submit for employee *</label><select class="fi" id="f-emp" onchange="mgrFormEmp=this.value">'+empOpts+'</select></div>')+'<div class="fg"><label class="fl">Category *</label><select class="fi" id="f-cat">'+catOpts+'</select></div><div class="fg"><label class="fl">Unit / location *</label><select class="fi" id="f-unit"><option value="">— Select unit —</option>'+unitOpts+'</select></div><div class="fg"><label class="fl">Description *</label><input class="fi" id="f-desc" placeholder="e.g. TNB Bill March"/></div><div class="tcol"><div class="fg"><label class="fl">Amount (RM) *</label><input class="fi" id="f-amount" type="number" placeholder="0.00"/></div><div class="fg"><label class="fl">Date *</label><input class="fi" id="f-date" type="date" value="'+today+'"/></div></div>'+'<div id="rbox">'+receiptBox('')+'</div><button class="pbtn '+(isCompany?'btn-s':'btn-p')+'" onclick="submitMgrClaim()">'+(isCompany?'Record as Company-Paid':'Submit (Auto-Approved)')+'</button></div>';
  }
}

// ===== GLOBAL HANDLERS =====
window.viewClaim=function(i,p){SEL=claims[i];ss('claimDetail',p);};
window.adminView=function(i,p){SEL=claims[i];ss('adminReview',p);};
window.startEmpEdit=function(id){editingId=id;ss('empEdit','claimDetail');};
window.openBankEdit=function(emp){editingBankEmp=emp;ss('bankEdit','adminEmployees');};
window.goBack=goBack;
window.doLogout=doLogout;
window.doLogin=doLogin;
window.openUsers=openUsersScreen;
window.createUserAccount=createUserAccount;
window.updateUserAccount=updateUserAccount;
window.deleteUserAccount=deleteUserAccount;window.reactivateUser=reactivateUser;
window.editUser=function(uid){editingUser=allUsers.filter(function(u){return u.id===uid;})[0];userFormError='';ss('userForm','adminUsers');};
window.doApprove=async function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit');
  if(!cat||!cat.value){toast('Please assign a category');return;}
  if(!unit||!unit.value){toast('Please assign a unit');return;}
  await approveClaim(SEL.id,cat.value,unit.value);
};
window.doReject=async function(){var r=document.getElementById('rv-reason');await rejectClaim(SEL.id,r?r.value:'No reason given');};
window.saveMgrEdit=saveMgrEdit;window.saveEmpEdit=saveEmpEdit;window.submitEmpEdit=submitEmpEdit;
window.submitNewClaim=submitNewClaim;window.submitMgrClaim=submitMgrClaim;
window.markClaimed=markClaimed;window.saveBankInfo=saveBankInfo;
window.mgrChangeToReject=async function(){
  var amt=document.getElementById('rv-amt');
  var upd={status:'Rejected',rejectReason:'Decision revised by manager'};
  if(amt&&amt.value)upd.amount=parseFloat(amt.value);
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Rejected');editingId=null;ss('adminList','adminDash');
};
window.mgrChangeToApprove=async function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit'),amt=document.getElementById('rv-amt');
  var upd={status:'Approved',rejectReason:''};
  if(cat&&cat.value)upd.category=cat.value;if(unit&&unit.value)upd.unit=unit.value;if(amt&&amt.value)upd.amount=parseFloat(amt.value);
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Approved');editingId=null;ss('adminList','adminDash');
};

// ===== INIT: CHECK SESSION =====
(async function(){
  render(); // show auth screen
  var{data:{session}}=await sb.auth.getSession();
  if(session&&session.user){
    await initSession(session.user);
  }
  sb.auth.onAuthStateChange(async function(event,session){
    if(event==='SIGNED_OUT'){
      currentUser=null;currentProfile=null;R=null;S='auth';claims=[];render();
    }
  });
})();
</script>
