async function loadClaims(){
  var q=sb.from('claims').select('*').order('created_at',{ascending:false});
  var{data,error}=await q;
  if(error){console.error('loadClaims:',error);return;}
  claims=data.map(function(r){return{id:r.claim_id,uid:r.id,emp:r.emp||'',unit:r.unit||'',category:r.category||'',desc:r.description,amount:parseFloat(r.amount),date:r.date,expMonth:r.expense_month||r.date.slice(0,7),status:r.status,rejectReason:r.reject_reason||'',slipRef:r.slip_ref||'',payType:r.pay_type,submittedBy:r.submitted_by};});
}
async function loadBankInfo(){
  var{data,error}=await sb.from('bank_info').select('*');
  if(error){console.error('loadBankInfo:',error);return;}
  BANK_INFO={};data.forEach(function(r){BANK_INFO[r.employee_name]={bank:r.bank||'',acc:r.acc||'',fullName:r.full_name||''};});
  EMPS=Object.keys(BANK_INFO);
    // Build active employees list (exclude deactivated and admin)
    var{data:profs}=await sb.from('profiles').select('full_name,active,role');
    var inactiveNames={};var adminNames={};
    if(profs)profs.forEach(function(p){if(p.active===false)inactiveNames[p.full_name]=true;if(p.role==='admin')adminNames[p.full_name]=true;});

async function loadUnits(){

  if(data&&data.length){
    UNITS_DATA=data;
    UNITS=UNITS_DATA.filter(function(u){return u.active!==false;}).map(function(u){return u.name;});

async function getNextClaimId(prefix){
  var now=new Date();var yr=now.getFullYear();
  var ym=yr+'-'+String(now.getMonth()+1).padStart(2,'0');
  var{data,error}=await sb.from('claim_sequences').select('last_number').eq('year',yr).single();
  var n;
  if(error||!data){
    n=1;
    await sb.from('claim_sequences').upsert({year:yr,last_number:1},{onConflict:'year'});
  } else {
    n=data.last_number+1;
    await sb.from('claim_sequences').update({last_number:n}).eq('year',yr);
  }
  return prefix+'-'+ym+'-'+String(n).padStart(5,'0');
}

  if(error)console.error('dbInsertClaim:',error);
  return !error;
}
async function dbUpdateClaim(claimId,fields){
  var upd={updated_at:new Date().toISOString()};
  if(fields.desc!==undefined)upd.description=fields.desc;
  if(fields.amount!==undefined)upd.amount=fields.amount;
  if(fields.date!==undefined)upd.date=fields.date;
  if(fields.status!==undefined)upd.status=fields.status;
  if(fields.category!==undefined)upd.category=fields.category;
  if(fields.unit!==undefined)upd.unit=fields.unit;
  if(fields.rejectReason!==undefined)upd.reject_reason=fields.rejectReason;
  if(fields.slipRef!==undefined)upd.slip_ref=fields.slipRef;
  if(fields.expMonth!==undefined)upd.expense_month=fields.expMonth;
  var{error}=await sb.from('claims').update(upd).eq('claim_id',claimId);
  if(error)console.error('dbUpdateClaim:',error);
  return !error;
}
async function dbDeleteClaim(claimId){
  var{data,error}=await sb.from('claims').delete().eq('claim_id',claimId).select('claim_id');

  var user=document.getElementById('auth-user'),pw=document.getElementById('auth-pw');
  if(!user||!pw||!user.value||!pw.value){authError='Please fill all fields';render();return;}
  authLoading=true;authError='';render();

  authLoading=false;
  if(error){authError='Invalid username or password';render();return;}
  await initSession(data.user);
}
async function doLogout(){
  await sb.auth.signOut();

async function initSession(user){
  currentUser=user;

  if(!prof){authLoading=false;authError='Profile not found. Contact admin.';S='auth';render();return;}

  currentProfile=prof;
  isSystemAdmin=prof.role==='admin';

  setupRealtime();
  authLoading=false;
  S=isSystemAdmin?'adminUsers':R==='admin'?'adminDash':'empHome';
  render();
}

async function createUserAccount(){
  var u=document.getElementById('uf-user'),p=document.getElementById('uf-pw'),n=document.getElementById('uf-name'),r=document.getElementById('uf-role');
  if(!u||!p||!n||!r||!u.value.trim()||!p.value||!n.value.trim()){userFormError='Please fill all fields';render();return;}
  if(p.value.length<6){userFormError='Password must be at least 6 characters';render();return;}

  var email=username+'@homestay.app';
  var fullName=n.value.trim();
  var role=r.value;
  // 1. Create auth user via Admin API
  var r1=await fetch(SUPABASE_URL+'/auth/v1/admin/users',{
    method:'POST',headers:adminHeaders,
    body:JSON.stringify({email:email,password:p.value,email_confirm:true,user_metadata:{full_name:fullName}})
  });
  var d1=await r1.json();
  if(!r1.ok||!d1.id){userFormError=d1.msg||d1.message||'Failed to create user';render();return;}

async function pdfToImageFile(file){
  if(typeof pdfjsLib==='undefined'){throw new Error('PDF.js not loaded');}
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var ab=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:ab}).promise;
  var numPages=Math.min(pdf.numPages,5); // scan up to 5 pages
  var scale=numPages>1?1.5:2.0; // lower scale for multi-page to control size
  var canvases=[];
  var totalHeight=0,maxWidth=0;
  for(var i=1;i<=numPages;i++){
    var page=await pdf.getPage(i);
    var viewport=page.getViewport({scale:scale});
    var canvas=document.createElement('canvas');
    canvas.width=viewport.width;canvas.height=viewport.height;
    var ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:viewport}).promise;
    canvases.push(canvas);
    totalHeight+=viewport.height;
    if(viewport.width>maxWidth)maxWidth=viewport.width;
  }
  // Stitch all pages vertically into one image
  var merged=document.createElement('canvas');
  merged.width=maxWidth;merged.height=totalHeight;
  var mctx=merged.getContext('2d');
  var yOffset=0;
  canvases.forEach(function(c){mctx.drawImage(c,0,yOffset);yOffset+=c.height;});
  return new Promise(function(resolve,reject){
    merged.toBlob(function(blob){
      if(!blob){reject(new Error('PDF conversion failed'));return;}
      resolve(new File([blob],file.name.replace(/\.pdf$/i,'.jpg'),{type:'image/jpeg'}));
    },'image/jpeg',0.90);
  });
}

function pickReceiptForAI(){
  var inp=document.getElementById('receipt-input');
  if(!inp){inp=document.createElement('input');inp.type='file';inp.id='receipt-input';inp.accept='image/*,.pdf';inp.style.display='none';inp.setAttribute('capture','environment');document.body.appendChild(inp);}
  inp.value='';inp.removeAttribute('multiple');
  inp.onchange=async function(){
    if(inp.files&&inp.files.length){
      var f=inp.files[0];
      pendingFiles=[];pendingFileNames=[];
      if(f.name.match(/\.pdf$/i)){
        aiAnalyzing=true;aiError='';newClaimStep='analyzing';render();
        try{f=await pdfToImageFile(f);}catch(e){aiError='PDF conversion failed: '+e.message;aiAnalyzing=false;newClaimStep='upload';render();return;}
      }
      pendingFiles.push(f);pendingFileNames.push(f.name);

async function startAIAnalysis(){
  if(!pendingFiles.length){toast('Please select a file first');return;}
  aiAnalyzing=true;aiError='';aiResult=null;newClaimStep='analyzing';render();
  try{
    var f=pendingFiles[0];
    var ext=f.name.split('.').pop().toLowerCase();
    var mimeMap={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',pdf:'application/pdf'};
    var mimeType=mimeMap[ext]||'image/jpeg';
    // Convert file to base64 and send directly to AI (no TMP upload)
    var reader=new FileReader();
    var base64=await new Promise(function(resolve,reject){reader.onload=function(){resolve(reader.result);};reader.onerror=reject;reader.readAsDataURL(f);});
    var{data:sessData}=await sb.auth.getSession();
    var authToken=sessData?.session?.access_token||'';
    if(!authToken){var{data:refData}=await sb.auth.refreshSession();authToken=refData?.session?.access_token||'';}
    if(!authToken)authToken=SUPABASE_KEY;
    var resp=await fetch(SUPABASE_URL+'/functions/v1/analyze-receipt',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken,'apikey':SUPABASE_KEY},
      body:JSON.stringify({base64Data:base64,mimeType:mimeType})
    });
    if(!resp.ok){
      var errBody=await resp.json().catch(function(){return{error:'Analysis failed'};});
      throw new Error(errBody.error||'Analysis failed (HTTP '+resp.status+')');
    }
    aiResult=await resp.json();
    newClaimStep='review';
  }catch(e){
    console.error('AI analysis error:',e);
    aiError=e.message||'Analysis failed. Try a clearer photo.';
    newClaimStep='upload';
    logFrontendError('error','startAIAnalysis',e.message||'AI analysis failed',{stack:e.stack});
  }
  aiAnalyzing=false;render();
}

function generateDescription(ai){
  var cat=ai.category||'';
  var summary=(ai.summary||'').toLowerCase();
  var items=ai.items||[];
  var refNo=ai.reference_number||'';
  var allText=(summary+' '+items.map(function(i){return i.name;}).join(' ')).toLowerCase();
  var desc='';
  if(allText.match(/electric|tnb|tenaga|elektrik|kwh/)) desc='Electricity Bill';
  else if(allText.match(/water bill|syabas|air bersih|pba|water supply|indah water/)||cat==='Utilities'&&allText.match(/water/)) desc='Water Bill';
  else if(allText.match(/internet|broadband|fibre|fiber|unifi|streamyx|tm one|maxis|celcom|digi fiber/)) desc='Internet Bill';
  else if(allText.match(/\bgas\b|petgas|gas supply|gas bill/)) desc='Gas Bill';
  else if(allText.match(/petrol|fuel|diesel|petronas|shell|caltex|ron\s*9|ron\s*95|ron\s*97|bph/)) desc='Fuel Purchase';
  else if(cat==='Laundry'||allText.match(/laundry|dobi|launder/)) desc='Laundry';
  else if(cat==='Housekeeping & Cleaning'||allText.match(/housekeep|cleaning service|cuci rumah/)) desc='Housekeeping & Cleaning';
  else if(cat==='Daily Products'||allText.match(/daily product|toiletries|toiletry|sabun|shampoo|tissue/)) desc='Daily Products Purchase';
  else if(cat==='Hospitality Items'||allText.match(/hospitality|amenity|amenities|towel|pillow|bedsheet/)) desc='Hospitality Items';
  else if(cat==='Maintenance & Repair'||allText.match(/repair|maintenance|servis|fix|plumb/)) desc='Maintenance & Repair';
  else if(cat==='Electrical & Unit Setup'||allText.match(/electrical setup|unit setup|aircond install|wiring/)) desc='Electrical & Unit Setup';
  else if(cat==='Office Expenses'||allText.match(/office|stationery|printing|photocopy/)) desc='Office Expenses';
  else if(cat==='Employee Welfare'||allText.match(/welfare|medical|meal allowance/)) desc='Employee Welfare';
  else if(cat==='Outsource Cleaning Staff'||allText.match(/outsource|cleaning staff|contractor/)) desc='Outsource Cleaning Staff';
  else if(cat==='Unit Renovation'||allText.match(/renovation|renovate|paint|tile/)) desc='Unit Renovation';
  else desc=ai.summary||'Receipt';
  if(refNo) desc=desc+' - '+refNo;
  return desc;
}

async function submitNewClaim(asDraft){

    var ok=await dbInsertUnit(name);
    if(ok){await loadUnits();toast('Unit "'+name+'" added');ss('adminUnits','adminDash');}
    else{unitFormError='Failed to add. Name may already exist.';render();}
  }
};
window.mgrScanReceipt=function(){
  var inp=document.getElementById('receipt-input');
  if(!inp){inp=document.createElement('input');inp.type='file';inp.id='receipt-input';inp.accept='image/*,.pdf';inp.style.display='none';inp.setAttribute('capture','environment');document.body.appendChild(inp);}
  inp.value='';inp.removeAttribute('multiple');
  inp.onchange=async function(){
    if(!inp.files||!inp.files.length)return;
    var f=inp.files[0];
    if(f.name.match(/\.pdf$/i)){
      aiAnalyzing=true;render();
      try{f=await pdfToImageFile(f);}catch(e){aiAnalyzing=false;render();toast('PDF conversion failed: '+e.message);return;}
    }
    pendingFiles=[f];pendingFileNames=[f.name];
    aiAnalyzing=true;render();
    try{
      var ext=f.name.split('.').pop().toLowerCase();
      var mimeMap={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',pdf:'application/pdf'};
      var reader2=new FileReader();
      var base64_2=await new Promise(function(resolve,reject){reader2.onload=function(){resolve(reader2.result);};reader2.onerror=reject;reader2.readAsDataURL(f);});
      var{data:sessData2}=await sb.auth.getSession();
      var authToken2=sessData2?.session?.access_token||'';
      if(!authToken2){var{data:refData2}=await sb.auth.refreshSession();authToken2=refData2?.session?.access_token||'';}
      if(!authToken2)authToken2=SUPABASE_KEY;
      var resp=await fetch(SUPABASE_URL+'/functions/v1/analyze-receipt',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken2,'apikey':SUPABASE_KEY},
        body:JSON.stringify({base64Data:base64_2,mimeType:mimeMap[ext]||'image/jpeg'})
      });
      if(!resp.ok){
        var errBody=await resp.json().catch(function(){return{error:'HTTP '+resp.status};});
        throw new Error(errBody.error||'HTTP '+resp.status);
      }
      var ai=await resp.json();
      aiAnalyzing=false;render();
      // Pre-fill the form fields after render
      setTimeout(function(){
        var d=document.getElementById('f-desc'),a=document.getElementById('f-amount'),dt=document.getElementById('f-date'),c=document.getElementById('f-cat');
        if(d)d.value=formatAiDescription(ai);
        if(a)a.value=ai.total||'';
        if(dt&&ai.date)dt.value=ai.date;
        if(c&&ai.category){for(var i=0;i<c.options.length;i++){if(c.options[i].value===ai.category){c.selectedIndex=i;break;}}}
        toast('AI filled: '+ai.summary);
      },50);
    }catch(e){
      aiAnalyzing=false;render();
      toast('AI scan failed: '+(e.message||'Try again'));
      logFrontendError('error','mgrScanReceipt',e.message||'AI scan failed',{stack:e.stack});
    }
  };
  inp.click();
};
window.mgrChangeToReject=async function(){

  if(amt&&amt.value)upd.amount=parseFloat(amt.value);
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Rejected');editingId=null;ss('adminList','adminDash');
};
window.mgrChangeToApprove=async function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit'),amt=document.getElementById('rv-amt');
  var upd={status:'Approved',rejectReason:''};
  if(cat&&cat.value)upd.category=cat.value;if(unit&&unit.value)upd.unit=unit.value;if(amt&&amt.value)upd.amount=parseFloat(amt.value);
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Approved');editingId=null;ss('adminList','adminDash');
};
window.openErrorLogs=function(){loadErrorLogs();ss('errorLogs',R==='admin'?'adminDash':'empHome');};
window.resolveErrorLog=async function(id){
  try{await sb.from('error_logs').update({resolved:true}).eq('id',id);errorLogs=errorLogs.map(function(l){if(l.id===id)l.resolved=true;return l;});render();}catch(e){toast('Failed to update');}
};
window.clearResolvedLogs=async function(){
  if(!confirm('Delete all resolved logs?'))return;
  try{await sb.from('error_logs').delete().eq('resolved',true);errorLogs=errorLogs.filter(function(l){return!l.resolved;});render();toast('Resolved logs cleared');}catch(e){toast('Failed to clear');}
};
