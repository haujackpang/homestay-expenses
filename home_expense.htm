<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Expense System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#f0f2f5;display:flex;justify-content:center;padding:20px 0 40px;}
.phone{width:375px;min-height:680px;background:#fff;border:1px solid #ddd;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.topbar{padding:13px 14px 11px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee;flex-shrink:0;}
.tbt{font-size:15px;font-weight:600;flex:1;color:#111;}
.tbr{font-size:10px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:99px;border:1px solid #e0e0e0;}
.bkb{font-size:13px;color:#2563eb;cursor:pointer;}
.lob{font-size:11px;color:#ef4444;cursor:pointer;padding:3px 8px;border:1px solid #fca5a5;border-radius:99px;white-space:nowrap;}
.scr{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;}
.nav{display:flex;border-top:1px solid #eee;flex-shrink:0;}
.ni{flex:1;padding:8px 0;text-align:center;font-size:9px;color:#888;cursor:pointer;line-height:1.4;}
.ni.on{color:#2563eb;}
.ni-ic{font-size:14px;display:block;}
.hero{border-radius:12px;padding:14px;}
.sgrid{display:grid;gap:7px;}
.sbox{background:#f9fafb;border-radius:8px;padding:9px;text-align:center;border:1px solid #e5e7eb;cursor:pointer;}
.snum{font-size:18px;font-weight:600;}
.slbl{font-size:10px;color:#6b7280;margin-top:1px;}
.cc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;}
.cc:hover{background:#f9fafb;}
.cc-id{font-size:10px;color:#9ca3af;font-family:monospace;}
.cc-desc{font-size:13px;font-weight:600;color:#111;margin-top:1px;}
.cc-r{text-align:right;flex-shrink:0;margin-left:8px;}
.cc-amt{font-size:13px;font-weight:600;color:#111;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:500;margin-top:3px;}
.bd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.b-sub{background:#dbeafe;color:#1d4ed8;}.b-sub .bd{background:#1d4ed8;}
.b-appr{background:#d1fae5;color:#065f46;}.b-appr .bd{background:#065f46;}
.b-rej{background:#fee2e2;color:#991b1b;}.b-rej .bd{background:#991b1b;}
.b-draft{background:#f3f4f6;color:#374151;}.b-draft .bd{background:#374151;}
.b-claimed{background:#fef3c7;color:#92400e;}.b-claimed .bd{background:#92400e;}
.b-auto{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;}.b-auto .bd{background:#9ca3af;}
.b-copay{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;}.b-copay .bd{background:#065f46;}
.pbtn{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.btn-p{background:#dbeafe;color:#1d4ed8;}
.btn-s{background:#d1fae5;color:#065f46;}
.btn-d{background:#fee2e2;color:#991b1b;}
.btn-o{background:transparent;border:1px solid #d1d5db;color:#374151;}
.btn-w{background:#fef3c7;color:#92400e;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;color:#6b7280;}
.fi{border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;font-size:13px;color:#111;background:#fff;width:100%;}
.fi:focus{outline:none;border-color:#2563eb;}
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.up-box{border:1px dashed #d1d5db;border-radius:8px;padding:14px;text-align:center;cursor:pointer;}
.dc{background:#f9fafb;border-radius:12px;padding:12px;border:1px solid #e5e7eb;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:9px;}
.di{background:#fff;border-radius:8px;padding:7px 9px;border:1px solid #e5e7eb;}
.dil{font-size:10px;color:#6b7280;}
.div_{font-size:12px;font-weight:600;color:#111;margin-top:1px;}
.rbox{background:#fee2e2;border-radius:8px;padding:8px 10px;margin-top:6px;}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.brow{margin-bottom:6px;}
.blbl{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-bottom:2px;}
.btrk{height:5px;background:#f3f4f6;border-radius:99px;overflow:hidden;}
.bfil{height:5px;border-radius:99px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:11px;padding:6px 14px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;}
.sec-t{font-size:13px;font-weight:600;color:#111;}
.va{font-size:12px;color:#2563eb;cursor:pointer;}
.flt-row{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:11px;padding:3px 8px;border-radius:99px;border:1px solid #d1d5db;cursor:pointer;color:#6b7280;background:#fff;white-space:nowrap;}
.chip.on{background:#dbeafe;color:#1d4ed8;border-color:transparent;}
.chk{width:16px;height:16px;border-radius:4px;border:1px solid #d1d5db;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;}
.chk.on{background:#2563eb;border-color:transparent;}
.slip-box{background:#fef3c7;border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:8px;}
.role-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;gap:10px;min-height:500px;}
.info-box{border-radius:8px;padding:9px 11px;}
.ptype-card{border:1px solid #e5e7eb;border-radius:12px;padding:10px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;}
.ptype-card.on{border-color:#93c5fd;background:#dbeafe;}
.ptype-title{font-size:12px;font-weight:600;color:#111;}
.ptype-desc{font-size:11px;color:#6b7280;margin-top:1px;}
.ptype-card.on .ptype-title,.ptype-card.on .ptype-desc{color:#1d4ed8;}
.lock-bar{border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;background:#f3f4f6;border:1px solid #e5e7eb;}
.edit-bar{border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;background:#fef3c7;}
.edit-link{font-size:12px;font-weight:600;color:#92400e;cursor:pointer;text-decoration:underline;}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px;}
.sum-row:last-child{border-bottom:none;font-weight:600;}
.tab-bar{display:flex;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;}
.tab-opt{flex:1;padding:8px;text-align:center;font-size:12px;cursor:pointer;color:#6b7280;background:#fff;}
.tab-opt.on{background:#dbeafe;color:#1d4ed8;font-weight:600;}
.emp-pay-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:8px;}
.eph{padding:11px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid #e5e7eb;cursor:pointer;}
.eph:hover{background:#f9fafb;}
.eph.no-border{border-bottom:none;}
.avatar{width:34px;height:34px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1d4ed8;flex-shrink:0;}
.emp-list-row{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px;}
.emp-list-row:hover{background:#f9fafb;}
.bank-card{background:#f9fafb;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb;}
.bk-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f3f4f6;}
.bk-row:last-child{border-bottom:none;}
.bk-lbl{color:#6b7280;}
.bk-val{font-weight:600;color:#111;}
.bk-val.mono{font-family:monospace;}
.no-bank{background:#fee2e2;border-radius:8px;padding:8px 11px;font-size:11px;color:#991b1b;}
.ecr{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6;}
.ecr:last-child{border-bottom:none;}
.transfer-summary{background:#d1fae5;border-radius:8px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
.ai-upload-zone{border:2px dashed #93c5fd;border-radius:16px;padding:28px 16px;text-align:center;cursor:pointer;background:#eff6ff;transition:border-color .2s,background .2s;}
.ai-upload-zone:active{background:#dbeafe;border-color:#2563eb;}
.ai-spinner{display:inline-block;width:28px;height:28px;border:3px solid #dbeafe;border-top:3px solid #2563eb;border-radius:50%;animation:ai-spin 1s linear infinite;}
@keyframes ai-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.ai-items-table{width:100%;border-collapse:collapse;font-size:12px;}
.ai-items-table th{text-align:left;padding:5px 6px;font-size:10px;color:#6b7280;border-bottom:1px solid #e5e7eb;}
.ai-items-table td{padding:5px 6px;border-bottom:1px solid #f3f4f6;color:#111;}
.ai-items-table td:last-child{text-align:right;font-weight:600;white-space:nowrap;}
.ai-result-card{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:10px;}
.ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:99px;background:#dbeafe;color:#1d4ed8;}
.ai-manual-link{font-size:11px;color:#6b7280;text-decoration:underline;cursor:pointer;text-align:center;display:block;margin-top:6px;}
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-45deg);font-size:96px;font-weight:700;color:rgba(239,68,68,0.12);pointer-events:none;white-space:nowrap;z-index:2;}
.phone.wide-phone{width:min(1120px,calc(100vw - 16px));}
.ci-shell{display:flex;flex-direction:column;gap:12px;}
.ci-section{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:12px;}
.ci-topline{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ci-title{font-size:15px;font-weight:700;color:#111;}
.ci-sub{font-size:11px;color:#6b7280;margin-top:2px;line-height:1.4;}
.ci-period{min-width:146px;}
.ci-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.ci-card{border-radius:12px;padding:11px 12px;border:1px solid #e5e7eb;background:#f9fafb;}
.ci-card.revenue{background:#dbeafe;border-color:#bfdbfe;}
.ci-card.expense{background:#fef3c7;border-color:#fde68a;}
.ci-card.profit{background:#d1fae5;border-color:#a7f3d0;}
.ci-card.profit.down{background:#fee2e2;border-color:#fecaca;}
.ci-kicker{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;}
.ci-card.revenue .ci-kicker{color:#1d4ed8;}
.ci-card.expense .ci-kicker{color:#92400e;}
.ci-card.profit .ci-kicker{color:#065f46;}
.ci-card.profit.down .ci-kicker{color:#991b1b;}
.ci-value{font-size:21px;font-weight:800;color:#111;margin-top:4px;}
.ci-card.revenue .ci-value{color:#1d4ed8;}
.ci-card.expense .ci-value{color:#92400e;}
.ci-card.profit .ci-value{color:#065f46;}
.ci-card.profit.down .ci-value{color:#991b1b;}
.ci-foot{font-size:10px;color:#6b7280;margin-top:4px;line-height:1.4;}
.ci-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:10px 12px;font-size:11px;color:#1d4ed8;line-height:1.45;}
.ci-grid{display:grid;gap:10px;}
.ci-chart-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:11px 12px;}
.ci-chart-title{font-size:12px;font-weight:700;color:#111;margin-bottom:2px;}
.ci-chart-sub{font-size:10px;color:#6b7280;margin-bottom:10px;line-height:1.4;}
.ci-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.ci-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#6b7280;}
.ci-dot{width:9px;height:9px;border-radius:99px;display:inline-block;flex-shrink:0;}
.ci-trend-wrap{position:relative;padding-top:6px;}
.ci-trend-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:end;min-height:188px;position:relative;z-index:2;}
.ci-trend-col{display:flex;flex-direction:column;align-items:center;gap:7px;}
.ci-trend-net{font-size:10px;font-weight:700;color:#065f46;background:#d1fae5;border-radius:99px;padding:2px 7px;white-space:nowrap;}
.ci-trend-net.down{background:#fee2e2;color:#991b1b;}
.ci-trend-bars{height:128px;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:7px;padding:0 2px;position:relative;}
.ci-trend-bar{width:30px;max-width:42%;border-radius:10px 10px 4px 4px;min-height:6px;}
.ci-trend-bar.rev{background:#60a5fa;}
.ci-trend-bar.exp{background:#fbbf24;}
.ci-trend-label{font-size:10px;color:#6b7280;}
.ci-trend-svg{position:absolute;left:0;right:0;top:28px;height:128px;width:100%;z-index:1;pointer-events:none;}
.ci-bar-list{display:flex;flex-direction:column;gap:8px;}
.ci-bar-row{display:grid;grid-template-columns:minmax(0,112px) 1fr auto;gap:8px;align-items:center;}
.ci-bar-label{font-size:11px;color:#374151;}
.ci-bar-track{height:11px;border-radius:999px;background:#eef2f7;overflow:hidden;}
.ci-bar-fill{height:100%;border-radius:999px;}
.ci-bar-val{font-size:11px;font-weight:700;color:#111;white-space:nowrap;}
.ci-kpi-strip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
.ci-mini{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px;text-align:center;}
.ci-mini .ci-kicker{font-size:9px;}
.ci-mini .ci-value{font-size:16px;margin-top:3px;}
.ci-unit-head{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-bottom:8px;}
.ci-unit-hint{font-size:10px;color:#6b7280;line-height:1.4;}
.ci-unit-table{width:100%;border-collapse:collapse;}
.ci-unit-table th{font-size:10px;color:#6b7280;text-align:left;padding:8px 6px;border-bottom:1px solid #e5e7eb;font-weight:600;}
.ci-unit-table td{font-size:12px;color:#111;padding:9px 6px;border-bottom:1px solid #f3f4f6;vertical-align:top;}
.ci-unit-table tr:last-child td{border-bottom:none;}
.ci-unit-table .num{text-align:right;white-space:nowrap;}
.ci-unit-name{font-weight:700;color:#111;}
.ci-unit-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.ci-tag{font-size:9px;padding:2px 7px;border-radius:999px;background:#e5e7eb;color:#374151;border:1px solid transparent;white-space:nowrap;}
.ci-tag.good{background:#d1fae5;color:#065f46;border-color:#a7f3d0;}
.ci-tag.warn{background:#fef3c7;color:#92400e;border-color:#fde68a;}
.ci-tag.info{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe;}
.ci-tag.bad{background:#fee2e2;color:#991b1b;border-color:#fecaca;}
.ci-unit-cards{display:flex;flex-direction:column;gap:8px;}
.ci-unit-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:11px 12px;}
.ci-unit-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
.ci-unit-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-top:10px;}
.ci-metric{background:#f9fafb;border-radius:10px;padding:8px 9px;border:1px solid #e5e7eb;}
.ci-metric .lbl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;}
.ci-metric .val{font-size:12px;font-weight:700;color:#111;margin-top:3px;}
.ci-alerts{display:grid;gap:8px;}
.ci-alert{border-radius:12px;padding:11px 12px;border:1px solid #e5e7eb;background:#fff;}
.ci-alert.warn{background:#fffbeb;border-color:#fde68a;}
.ci-alert.bad{background:#fef2f2;border-color:#fecaca;}
.ci-alert.info{background:#eff6ff;border-color:#bfdbfe;}
.ci-alert.good{background:#ecfdf5;border-color:#a7f3d0;}
.ci-alert-title{font-size:12px;font-weight:700;color:#111;}
.ci-alert-copy{font-size:11px;color:#4b5563;line-height:1.45;margin-top:4px;}
@media (min-width:900px){
  .ci-summary{grid-template-columns:repeat(4,minmax(0,1fr));}
  .ci-grid.two-col{grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr);}
  .ci-mobile-only{display:none !important;}
}
@media (max-width:899px){
  .ci-desktop-only{display:none !important;}
}
</style>
</head>

<div class="phone" id="app">
<div class="topbar" id="topbar">
  <span id="bb" class="bkb" style="display:none" onclick="goBack()">← Back</span>

</div>

<script>
// ===== SUPABASE CONFIG =====
var SUPABASE_URL='__SUPABASE_URL__';
var SUPABASE_KEY='__SUPABASE_KEY__';
var TEST_REPO_PATH='/homestayerp-test';
var SUPABASE_CONFIG_ERROR='';
SUPABASE_URL=String(SUPABASE_URL||'').trim();
SUPABASE_KEY=String(SUPABASE_KEY||'').trim();
function isSupabasePublicKey(v){
  if(!v)return false;
  return v.indexOf('sb_publishable_')===0||v.indexOf('.')>0;
}
var SUPABASE_PLACEHOLDERS=(!SUPABASE_URL||SUPABASE_URL.indexOf('https://')!==0||SUPABASE_URL.indexOf('.supabase.co')<0||!isSupabasePublicKey(SUPABASE_KEY));
var sb=null;
if(SUPABASE_PLACEHOLDERS){
  SUPABASE_URL='';
  SUPABASE_KEY='';
  SUPABASE_CONFIG_ERROR='Supabase configuration is missing for this deployment.';
  console.error(SUPABASE_CONFIG_ERROR);
}else{
  try{sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){SUPABASE_CONFIG_ERROR='Supabase init error: '+e.message;console.error(SUPABASE_CONFIG_ERROR);}
}

// ===== STATE =====
var R=null,S='auth',PS=null,SEL=null,editingId=null,payTab='byEmp';
var currentUser=null,currentProfile=null;
var fltStatus='All',fltMonth='All',fltYear='All',fltEmp='All';
var empFltStatus='All',empFltMonth='All',empFltYear='All';

var empDashMonth='All',empDashYear='All';
var dashFltMonth='All',dashFltYear='All',dashFltUnit='All';
var empHistMonth='All',empHistYear='All';
var adminHistMonth='All',adminHistYear='All',adminHistEmp='All';
var unitExpUnit='All',unitExpMonth='All',unitExpYear='All',unitExpStatus='All';
var checkedClaims={},slipFiles=[],slipFileNames=[];
var mgrFormEmp='',mgrFormPayType='employee';
var empExpandMap={},editingBankEmp=null;
var fxCollapsed=true;
var claims=[],BANK_INFO={},EMPS=[],ACTIVE_EMPS=[],UNITS_DATA=[];
var editingUnit=null,unitFormError='';
var authError='',authLoading=false;
var isSystemAdmin=false,allUsers=[],editingUser=null,userFormError='',userListSource='auth';
var resetPasswordUser=null,resetPasswordError='',resetPasswordDraft1='',resetPasswordDraft2='';
var pendingFiles=[],pendingFileNames=[];
var AI_RECEIPT_SCAN_ENABLED=false;
var aiResult=null,aiAnalyzing=false,aiError='',newClaimStep='manual';
var claimSubmitBusy=false,mgrSubmitBusy=false;
var errorLogs=[],errorLogLoading=false,errorLogPage=1,errorLogTotal=0,errorLogHasMore=false;
var ERROR_LOG_PAGE_SIZE=50,frontendLogBusy=false;
var unitTypes=[],unitConfig=[];
var rptUnit='',rptMonth='',rptYear='';
var companyInsightPeriod='';
var editingUnitType=null,editingUnitCfg=null,utFormError='',ucFormError='';
var syncLogs=[],syncLoading=false,syncRunning=false,unitSyncing=false;
var showInactiveUnits=false;
var unitPairingFilter='All',unitPairingSearch='';
var reservations=[];
var ATTACHMENT_URLS={};

// ===== FRONTEND ERROR LOGGER =====
async function logFrontendError(level,source,message,details){
  if(frontendLogBusy||!sb)return;
  try{
    frontendLogBusy=true;
    await sb.from('error_logs').insert({level:level,source:source,message:String(message||'Unknown error').slice(0,1000),details:safeLogDetails(details),user_agent:navigator.userAgent});
  }catch(e){console.error('Failed to log error:',e);}
  frontendLogBusy=false;
}
function shortSupabaseErrorMessage(error,fallback){
  var msg=error&&error.message?String(error.message):'';
  var hint=error&&error.hint?String(error.hint):'';
  var details=error&&error.details?String(error.details):'';
  var out=msg||hint||details||fallback||'Unknown error';
  return out.length>160?out.slice(0,157)+'...':out;
}
function safeLogDetails(details){
  try{
    return JSON.parse(JSON.stringify(details||{},function(k,v){
      if(v instanceof Error)return serializeErrorForLog(v);
      if(typeof v==='string'&&v.length>2000)return v.slice(0,2000)+'...';
      return v;
    }));
  }catch(e){
    return{serialization_error:e&&e.message?e.message:String(e)};
  }
}
function serializeErrorForLog(error){
  if(!error)return{};
  if(typeof error==='string')return{message:error};
  var out={};
  ['name','code','message','details','hint','status','statusCode'].forEach(function(k){if(error[k]!==undefined&&error[k]!==null)out[k]=error[k];});
  if(error.stack)out.stack=String(error.stack).slice(0,2000);
  if(!Object.keys(out).length){
    try{out.value=JSON.stringify(error).slice(0,2000);}catch(e){out.value=String(error).slice(0,2000);}
  }
  return out;
}
function installGlobalErrorLogging(){
  if(window.__homeExpenseErrorLoggingInstalled)return;
  window.__homeExpenseErrorLoggingInstalled=true;
  window.addEventListener('error',function(ev){
    logFrontendError('error','window.error',ev.message||'Unhandled frontend error',{filename:ev.filename||'',lineno:ev.lineno||0,colno:ev.colno||0,error:serializeErrorForLog(ev.error)});
  });
  window.addEventListener('unhandledrejection',function(ev){
    var reason=ev.reason||{};
    logFrontendError('error','unhandledrejection',reason.message||'Unhandled promise rejection',{reason:serializeErrorForLog(reason)});
  });
}
function claimSubmitFailureText(error){
  if(!error)return'Failed to save expense';
  if(typeof error==='string')return String(error).slice(0,200);
  if(error.message)return String(error.message).slice(0,200);
  if(error.error_description)return String(error.error_description).slice(0,200);
  try{return JSON.stringify(error).slice(0,200);}catch(e){return String(error).slice(0,200);}
}
async function logClaimSubmitFailure(source,claim,error,context){

}

async function functionAuthHeaders(forceRefresh){
  var{data:sessData}=await sb.auth.getSession();
  var authToken=sessData&&sessData.session&&sessData.session.access_token?sessData.session.access_token:'';
  var expiresAt=sessData&&sessData.session&&sessData.session.expires_at?sessData.session.expires_at:0;
  var isExpiring=expiresAt&&expiresAt*1000<Date.now()+60000;
  if(forceRefresh||!authToken||isExpiring){var{data:refData}=await sb.auth.refreshSession();authToken=refData&&refData.session?refData.session.access_token:authToken;}
  if(!authToken)authToken=SUPABASE_KEY;
  return {'Content-Type':'application/json','Authorization':'Bearer '+authToken,'apikey':SUPABASE_KEY};
}
async function callEdgeFunction(name,body){
  var headers=await functionAuthHeaders();
  var r=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',headers:headers,body:JSON.stringify(body||{})});
  var d=await r.json().catch(function(){return{error:'Request failed'};});
  if(r.status===401){
    headers=await functionAuthHeaders(true);
    r=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',headers:headers,body:JSON.stringify(body||{})});
    d=await r.json().catch(function(){return{error:'Request failed'};});
  }
  if(!r.ok||d.ok===false)throw new Error(d.error||('Request failed (HTTP '+r.status+')'));
  return d;
}
async function callPublicEdgeFunction(name,body){
  var headers={'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY};
  var r=await fetch(SUPABASE_URL+'/functions/v1/'+name,{method:'POST',headers:headers,body:JSON.stringify(body||{})});
  var d=await r.json().catch(function(){return{error:'Request failed'};});
  if(!r.ok||d.ok===false)throw new Error(d.error||('Request failed (HTTP '+r.status+')'));
  return d;
}

}

function hpPropertyKey(hpPropertyId,propertyName){
  if(hpPropertyId)return 'id:'+hpPropertyId;
  return 'name:'+String(propertyName||'').toLowerCase().trim();
}
function hpPropertyDomKey(k){return (k||'').replace(/[^a-zA-Z0-9_-]/g,'_');}
function unitDisplayName(u){
  if(!u)return'';
  if(u.mapped_unit_name)return u.mapped_unit_name;
  return u.property_short?u.property_short+' '+u.name:u.name;
}
function uniqueNames(arr){
  var seen={},out=[];
  arr.forEach(function(v){if(v&&!seen[v]){seen[v]=true;out.push(v);}});
  return out;
}
function internalUnitRows(){
  return UNITS_DATA
    .filter(function(u){return u.source!=='hostplatform'&&u.active!==false;})
    .map(function(u){
      var display=unitDisplayName(u);
      return{
        value:display,
        label:(u.name||display||'').trim()||display,
        shortCode:(u.property_short||'').toUpperCase()
      };
    })
    .sort(function(a,b){return a.value.localeCompare(b.value);});
}
function internalUnitOptions(selected){
  var sel=selected||'';
  var rows=internalUnitRows();
  var opts=['<option value="">— Select internal unit —</option>'];
  rows.forEach(function(r){opts.push('<option value="'+r.value+'" data-short="'+r.shortCode+'"'+(sel===r.value?' selected':'')+'>'+r.label+'</option>');});
  if(sel&&!rows.some(function(r){return r.value===sel;}))opts.push('<option value="'+sel+'" selected>'+sel+' (legacy)</option>');
  return opts.join('');
}
function mappedInternalUnitNames(exceptUnitId){
  var used={};
  UNITS_DATA

    .forEach(function(u){used[u.mapped_unit_name]=true;});
  return used;
}
function internalUnitMappingOptions(selected,exceptUnitId){

}

function reportUnitAliases(unitName){
  var base=String(unitName||'').trim();
  if(!base)return[];
  var out=[base];
  var m=base.match(/^[A-Za-z]{2,3}\s+(.+)$/);
  var bare=(m&&m[1])?m[1].trim():base;
  if(bare)out.push(bare);
  // Include legacy unit strings already saved in claims (e.g. "AR C3706") even if the unit is now inactive.
  if(claims&&claims.length&&bare){
    claims.forEach(function(c){
      var u=String(c.unit||'').trim();
      if(!u)return;
      if(u===base||u===bare||u.slice(-1*(bare.length+1))===' '+bare)out.push(u);
    });
  }
  if(UNITS_DATA&&UNITS_DATA.length){
    UNITS_DATA.forEach(function(u){
      if(!u||u.active===false||u.source!=='hostplatform')return;
      var raw=u.property_short?u.property_short+' '+u.name:u.name;
      if(!raw)return;
      var mapped=String(u.mapped_unit_name||'').trim();
      var hpName=String(u.name||'').trim();
      if(mapped&&mapped===bare)out.push(raw);
      if(hpName&&hpName===bare)out.push(raw);
    });
  }
  return uniqueNames(out.filter(Boolean));
}
function reportChargeBucket(unitName,chargedTo){
  var v=String(chargedTo||'');
  if(v==='Owner'||v==='Operator'||v==='Both')return v;
  if(String(unitName||'')==='MP Office')return '';
  // Backward compatibility: older rows may have charged_to='' after the column was added.
  return 'Both';
}
function hpUnitRows(){
  return UNITS_DATA
    .filter(function(u){return u.source==='hostplatform'&&u.active!==false;})
    .map(function(u){
      var unitKey=u.id||u.hp_unit_id||hpPropertyKey(u.hp_property_id,u.property_name)+'::'+u.name;
      return{
        key:unitKey,
        domKey:hpPropertyDomKey(unitKey),
        unitId:u.id||'',
        hpUnitId:u.hp_unit_id||'',
        hpPropertyId:u.hp_property_id||'',
        propertyName:u.property_name||'Unknown Property',
        unitName:u.name||'',
        mappedUnitName:u.mapped_unit_name||'',
        propertyShort:u.property_short||'',
        active:u.active!==false
      };
    })
    .sort(function(a,b){
      var pa=a.propertyName.localeCompare(b.propertyName);
      if(pa!==0)return pa;
      return a.unitName.localeCompare(b.unitName);
    });
}
function pairingFilterRows(){
  var term=String(unitPairingSearch||'').toLowerCase().trim();
  return hpUnitRows().filter(function(u){
    if(unitPairingFilter==='Paired'&&!u.mappedUnitName)return false;
    if(unitPairingFilter==='Unmapped'&&u.mappedUnitName)return false;
    if(!term)return true;
    var hay=[u.propertyName,u.unitName,u.mappedUnitName,u.propertyShort].join(' ').toLowerCase();
    return hay.indexOf(term)>=0;
  });
}
function pairingCount(filter){
  return hpUnitRows().filter(function(u){
    if(filter==='Paired')return !!u.mappedUnitName;
    if(filter==='Unmapped')return !u.mappedUnitName;
    return true;
  }).length;
}

function getCategoryPrefix(cat){
  if(cat==='Water Bill')return '[WB]';
  if(cat==='Electricity Bill')return '[EB]';
  if(cat==='Internet Bill')return '[INT]';
  if(cat==='Rental')return '[Rental]';
  if(cat==='Maintenance & Repair')return '[Maintenance]';
  return '[INV]';
}
function fmtMonthYear(dateStr){
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d=new Date(dateStr||new Date());
  return months[d.getMonth()]+String(d.getFullYear()).slice(2);
}
function buildAttachName(cat,unit,desc,date,aiItems){
  var prefix=getCategoryPrefix(cat);
  var my=fmtMonthYear(date);
  var safe=function(s){return(s||'').replace(/[^a-zA-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();};
  if(prefix!=='[INV]'){
    var parts=[prefix];
    if(unit)parts.push(unit);
    parts.push(my);
    return parts.join(' ');
  }else{
    var summary='';
    if(aiItems&&aiItems.length){
      summary=aiItems.slice(0,3).map(function(it){return it.qty+'x'+it.name;}).join(' ');
      if(summary.length>36)summary=summary.slice(0,36).trim();
    }else{
      summary=safe(desc).slice(0,30).trim();
    }
    return prefix+' '+summary+' '+my;
  }
}
async function compressImageFile(file){
  if(typeof ImageCompression==='undefined'){console.warn('browser-image-compression not loaded');return file;}
  try{
    var options={maxSizeMB:0.3,maxWidthOrHeight:1280,useWebWorker:true};
    var compressed=await ImageCompression.compress(file,options);
    return new File([compressed],file.name,{type:'image/jpeg'});
  }catch(e){
    console.warn('Image compression failed',e);
    return file;
  }
}
async function imageToPdf(file){
  var jsPDFLib=window.jspdf&&window.jspdf.jsPDF?window.jspdf.jsPDF:null;
  if(!jsPDFLib){console.warn('jsPDF not loaded, uploading original');return file;}
  return new Promise(function(resolve){
    var url=URL.createObjectURL(file);
    var img=new Image();
    img.onload=function(){
      var w=img.naturalWidth,h=img.naturalHeight;
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url);
      var orient=w>h?'l':'p';
      var wPt=w*0.75,hPt=h*0.75;
      var doc=new jsPDFLib({orientation:orient,unit:'pt',format:[wPt,hPt]});
      var dataUrl=canvas.toDataURL('image/jpeg',0.90);
      doc.addImage(dataUrl,'JPEG',0,0,wPt,hPt);
      resolve(new File([doc.output('blob')],file.name.replace(/\.(jpe?g|png|gif|webp|heic|bmp)$/i,'.pdf'),{type:'application/pdf'}));
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}
function splitAttachmentRefs(value){

}
function joinAttachmentRefs(list){
  return list.filter(function(v){return !!v;}).join(',');
}
function mergeAttachmentRefs(existing,added){
  var seen={},out=[];
  splitAttachmentRefs(existing).concat(splitAttachmentRefs(added)).forEach(function(ref){
    if(ref&&!seen[ref]){seen[ref]=true;out.push(ref);}
  });
  return joinAttachmentRefs(out);
}
function attachmentName(ref,prefix,index){

function attachmentUrlForRef(ref){

  if(/^https?:\/\//i.test(ref))return ref;
  return ATTACHMENT_URLS[ref]||'';

async function hydrateClaimAttachmentUrls(list){
  var need=[],seen={};
  (list||[]).forEach(function(c){
    splitAttachmentRefs(c.receiptRefs).concat(splitAttachmentRefs(c.paymentSlipRefs)).forEach(function(ref){
      if(!ref||/^https?:\/\//i.test(ref)||ATTACHMENT_URLS[ref]||seen[ref])return;
      seen[ref]=true;
      need.push(ref);
    });
  });
  if(!need.length)return;
  try{
    var resp=await callEdgeFunction('process-invoice',{action:'create-claim-attachment-read-urls',paths:need});
    var items=resp&&resp.items?resp.items:[];
    items.forEach(function(it){
      if(it&&it.path&&it.signedUrl)ATTACHMENT_URLS[it.path]=it.signedUrl;
    });
  }catch(e){
    console.error('hydrateClaimAttachmentUrls failed:',e);
  }
}

async function pdfToImageFile(file){
  if(typeof pdfjsLib==='undefined'){throw new Error('PDF.js not loaded');}
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var ab=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:ab}).promise;
  var numPages=Math.min(pdf.numPages,5); // scan up to 5 pages
  var scale=numPages>1?1.5:2.0; // lower scale for multi-page to control size
  var canvases=[];
  var totalHeight=0,maxWidth=0;
  for(var i=1;i<=numPages;i++){
    var page=await pdf.getPage(i);
    var viewport=page.getViewport({scale:scale});
    var canvas=document.createElement('canvas');
    canvas.width=viewport.width;canvas.height=viewport.height;
    var ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:viewport}).promise;
    canvases.push(canvas);
    totalHeight+=viewport.height;
    if(viewport.width>maxWidth)maxWidth=viewport.width;
  }
  // Stitch all pages vertically into one image
  var merged=document.createElement('canvas');
  merged.width=maxWidth;merged.height=totalHeight;
  var mctx=merged.getContext('2d');
  var yOffset=0;
  canvases.forEach(function(c){mctx.drawImage(c,0,yOffset);yOffset+=c.height;});
  return new Promise(function(resolve,reject){
    merged.toBlob(function(blob){
      if(!blob){reject(new Error('PDF conversion failed'));return;}
      resolve(new File([blob],file.name.replace(/\.pdf$/i,'.jpg'),{type:'image/jpeg'}));
    },'image/jpeg',0.90);
  });
}

function loadImageElement(src){
  return new Promise(function(resolve,reject){
    var img=new Image();
    img.onload=function(){resolve(img);};
    img.onerror=function(){reject(new Error('Image load failed'));};
    img.src=src;
  });
}

async function optimizeImageForAI(file){
  var mimeType=(file.type||'').toLowerCase();
  if(!mimeType||mimeType==='application/pdf'||mimeType==='image/gif')return file;
  var src=URL.createObjectURL(file);
  try{
    var img=await loadImageElement(src);
    var maxDim=Math.max(img.width||0,img.height||0);
    if(file.size<=4*1024*1024&&maxDim<=1800)return file;
    var scale=maxDim>1800?1800/maxDim:1;
    var canvas=document.createElement('canvas');
    canvas.width=Math.max(1,Math.round((img.width||1)*scale));
    canvas.height=Math.max(1,Math.round((img.height||1)*scale));
    var ctx=canvas.getContext('2d');
    if(!ctx)throw new Error('Canvas not available');
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    var qualities=[0.9,0.82,0.74,0.66];
    var bestBlob=null;
    for(var i=0;i<qualities.length;i++){
      var blob=await new Promise(function(resolve){canvas.toBlob(resolve,'image/jpeg',qualities[i]);});
      if(!blob)continue;
      bestBlob=blob;
      if(blob.size<=4*1024*1024)break;
    }
    if(!bestBlob)throw new Error('Image compression failed');
    return new File([bestBlob],file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'});
  }finally{
    URL.revokeObjectURL(src);
  }
}

async function analyzeInvoiceFile(f,unit){
  if(!AI_RECEIPT_SCAN_ENABLED)throw new Error('AI receipt scan is currently disabled.');
  var scanFile=await optimizeImageForAI(f);
  if(scanFile.size>5*1024*1024)throw new Error('Receipt photo is too large. Please crop it or use a clearer photo under 5MB.');
  var ext=scanFile.name.split('.').pop().toLowerCase();
  var mimeMap={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',pdf:'application/pdf'};
  var mimeType=(scanFile.type||mimeMap[ext]||'image/jpeg').toLowerCase();
  var uploadedScan=await uploadScanFileForAI(scanFile);
  var result;
  try{
    result=await callEdgeFunction('process-invoice',{storagePath:uploadedScan.path,mimeType:mimeType,unit:unit||''});
  }catch(e){
    var msg=e&&e.message?e.message:String(e||'');
    if(msg==='Failed to fetch'||msg.toLowerCase().indexOf('network request failed')>=0){
      throw new Error('Network request failed while scanning receipt. Please retry with a clearer photo under 5MB.');
    }
    throw e;
  }
  var ai=result.ai||result;
  ai.duplicate_claims=result.duplicate_claims||[];
  ai.suggested=result.suggested||{};
  return ai;
}

async function startAIAnalysis(){
  if(!AI_RECEIPT_SCAN_ENABLED){newClaimStep='manual';toast('AI receipt scan is currently disabled. Please submit manually.');render();return;}
  if(!pendingFiles.length){toast('Please select a file first');return;}
  aiAnalyzing=true;aiError='';aiResult=null;newClaimStep='analyzing';render();
  try{
    var f=pendingFiles[0];
    aiResult=await analyzeInvoiceFile(f,'');
    newClaimStep='review';
    if(aiResult&&aiResult.duplicate_claims&&aiResult.duplicate_claims.length)toast(duplicateClaimMessage(aiResult));
  }catch(e){
    console.error('AI analysis error:',e);
    aiError=e.message||'Analysis failed. Try a clearer photo.';
    newClaimStep='upload';
    logFrontendError('error','startAIAnalysis',e.message||'AI analysis failed',{stack:e.stack});
  }
  aiAnalyzing=false;render();
}

function generateDescription(ai){
  var cat=ai.category||'';
  var summary=(ai.summary||'').toLowerCase();
  var items=ai.items||[];
  var refNo=ai.reference_number||'';
  var allText=(summary+' '+items.map(function(i){return i.name;}).join(' ')).toLowerCase();
  var desc='';
  if(allText.match(/electric|tnb|tenaga|elektrik|kwh/)) desc='Electricity Bill';
  else if(allText.match(/water bill|syabas|air bersih|pba|water supply|indah water/)||cat==='Utilities'&&allText.match(/water/)) desc='Water Bill';
  else if(allText.match(/internet|broadband|fibre|fiber|unifi|streamyx|tm one|maxis|celcom|digi fiber/)) desc='Internet Bill';
  else if(allText.match(/\bgas\b|petgas|gas supply|gas bill/)) desc='Gas Bill';
  else if(allText.match(/petrol|fuel|diesel|petronas|shell|caltex|ron\s*9|ron\s*95|ron\s*97|bph/)) desc='Fuel Purchase';
  else if(cat==='Laundry'||allText.match(/laundry|dobi|launder/)) desc='Laundry';
  else if(cat==='Housekeeping & Cleaning'||allText.match(/housekeep|cleaning service|cuci rumah/)) desc='Housekeeping & Cleaning';
  else if(cat==='Daily Products'||allText.match(/daily product|toiletries|toiletry|sabun|shampoo|tissue/)) desc='Daily Products Purchase';
  else if(cat==='Hospitality Items'||allText.match(/hospitality|amenity|amenities|towel|pillow|bedsheet/)) desc='Hospitality Items';
  else if(cat==='Maintenance & Repair'||allText.match(/repair|maintenance|servis|fix|plumb/)) desc='Maintenance & Repair';
  else if(cat==='Electrical & Unit Setup'||allText.match(/electrical setup|unit setup|aircond install|wiring/)) desc='Electrical & Unit Setup';
  else if(cat==='Office Expenses'||allText.match(/office|stationery|printing|photocopy/)) desc='Office Expenses';
  else if(cat==='Employee Welfare'||allText.match(/welfare|medical|meal allowance/)) desc='Employee Welfare';
  else if(cat==='Outsource Cleaning Staff'||allText.match(/outsource|cleaning staff|contractor/)) desc='Outsource Cleaning Staff';
  else if(cat==='Unit Renovation'||allText.match(/renovation|renovate|paint|tile/)) desc='Unit Renovation';
  else desc=ai.summary||'Receipt';

function activeClaimDbDuplicate(emp,date,amount,desc){
  var amt=Number(amount||0).toFixed(2);
  var dt=String(date||'').slice(0,10);
  var ds=String(desc||'');
  return claims.filter(function(c){
    return c.status!=='Rejected'&&c.status!=='Draft'
      && String(c.emp||'')===String(emp||'')
      && String(c.date||'').slice(0,10)===dt
      && Number(c.amount||0).toFixed(2)===amt
      && String(c.desc||'')===ds;
  })[0]||null;
}
function dbDuplicateClaimMessage(dup){

  return'Duplicate blocked: an existing claim already has the same employee, date, amount and description. Please edit the existing claim instead.';
}
function claimInsertFailureMessage(claim,error,prefix){
  var dup=activeClaimDbDuplicate(claim.emp,claim.date,claim.amount,claim.desc);
  if(dup||String(error&&error.message||'').indexOf('claims_dup_check')>=0)return dbDuplicateClaimMessage(dup);
  return prefix+': '+claimSubmitFailureText(error);

function isClaimsDupCheckError(error){
  var code=String(error&&error.code||'');
  var msg=[error&&error.message,error&&error.details,error&&error.hint].filter(Boolean).join(' ');

async function findDbExactDuplicateClaimId(claim){
  try{
    var q=sb.from('claims')
      .select('claim_id')
      .eq('emp',claim&&claim.emp?claim.emp:'')
      .eq('date',String(claim&&claim.date?claim.date:'').slice(0,10))
      .eq('amount',claim&&claim.amount!==undefined?claim.amount:0)
      .eq('description',claim&&claim.desc?claim.desc:'')
      .neq('status','Rejected')
      .neq('status','Draft')
      .order('created_at',{ascending:false})
      .limit(1);
    var res=await q;
    if(res.error){console.warn('findDbExactDuplicateClaimId:',res.error);return null;}
    return res.data&&res.data.length?res.data[0].claim_id:null;
  }catch(e){
    console.error('findDbExactDuplicateClaimId:',e);
    return null;
  }
}

async function submitNewClaim(asDraft){
  if(claimSubmitBusy)return;
  var desc=document.getElementById('f-desc'),amt=document.getElementById('f-amount'),dt=document.getElementById('f-date'),cat=document.getElementById('f-cat');
  if(!desc||!amt||!dt)return;
  var dv=desc.value,av=parseFloat(amt.value),dtv=dt.value,cv=cat?cat.value:'';
  if(!asDraft&&(!dv||!av||!dtv)){toast('Please fill all required fields');return;}
  if(!asDraft&&aiResult&&aiResult.duplicate_claims&&aiResult.duplicate_claims.length){toast(duplicateClaimMessage(aiResult));return;}
  // AI amount mismatch check (Feature 3)
  if(!asDraft&&aiResult&&aiResult.total>0&&av>0&&Math.abs(aiResult.total-av)>0.01){
    if(!confirm('⚠️ Amount mismatch: AI extracted RM '+aiResult.total.toFixed(2)+' but you entered RM '+av.toFixed(2)+'. Submit anyway?'))return;
  }
  // Duplicate check: same employee, same amount, same month, not rejected/draft
  if(!asDraft&&av&&dtv){
    var dupMonth=dtv.slice(0,7);
    var dups=claims.filter(function(c){return c.emp===myName()&&c.amount===av&&c.date.slice(0,7)===dupMonth&&c.status!=='Rejected'&&c.status!=='Draft';});
    if(dups.length>0)toast('Heads up: You already have a similar claim (RM '+av.toFixed(2)+') in '+dupMonth+'.');
  }
  // Attachment duplicate check: same AI reference number (Feature 1)
  if(!asDraft&&aiResult&&aiResult.reference_number){
    var rfN=(aiResult.reference_number||'').trim();
    if(rfN){
      var refDups=claims.filter(function(c){return c.desc&&c.desc.indexOf(rfN)>=0&&c.status!=='Rejected'&&c.status!=='Draft';});
      if(refDups.length>0)toast('Heads up: This receipt ref '+rfN+' already appears in '+refDups[0].id+'.');
    }
  }
  if(!asDraft){
    var exactDup=activeClaimDbDuplicate(myName(),dtv||new Date().toISOString().slice(0,10),av||0,dv||'(untitled)');
    if(exactDup){toast(dbDuplicateClaimMessage(exactDup));return;}
  }
  claimSubmitBusy=true;render();
  try{
    var cid=await getNextClaimId('HE');
    var emv=document.getElementById('f-expmonth');var expM=emv?emv.value:(dtv||new Date().toISOString().slice(0,10)).slice(0,7);
    var nc={id:cid,emp:myName(),unit:'',category:cv,desc:dv||'(untitled)',amount:av||0,date:dtv||new Date().toISOString().slice(0,10),expMonth:expM,status:asDraft?'Draft':'Submitted',rejectReason:'',slipRef:'',receiptRefs:'',paymentSlipRefs:'',payType:'employee',submittedBy:'self',invoiceNumber:aiResult?(aiResult.invoice_number||aiResult.reference_number||''):'',merchantName:aiResult?(aiResult.merchant_name||''):'',aiRaw:aiResult||{},aiConfidence:aiResult?(aiResult.confidence||0):0,sourceType:aiResult?'ai_scan':'manual'};
    if(pendingFiles.length){
      var receiptRefs='';
      try{receiptRefs=await uploadAllFiles(cid,{category:cv,unit:'',desc:dv||'',date:dtv||new Date().toISOString().slice(0,10),aiItems:aiResult?aiResult.items:null});}catch(e){console.error(e);await logClaimSubmitFailure('submitNewClaim.receiptUpload',nc,e,{as_draft:asDraft});toast(e&&e.message?e.message:'Receipt upload failed');claimSubmitBusy=false;render();return;}
      if(!receiptRefs){toast('Receipt upload failed');claimSubmitBusy=false;render();return;}
      nc.receiptRefs=receiptRefs;
    }
    var insertResult=await dbInsertClaim(nc);
    claimSubmitBusy=false;
    if(!insertResult.ok){
      if(isClaimsDupCheckError(insertResult.error)){
        var dupExact=activeClaimDbDuplicate(nc.emp,nc.date,nc.amount,nc.desc);
        var dupId=(dupExact&&dupExact.id)?dupExact.id:await findDbExactDuplicateClaimId(nc);
        await logClaimSubmitFailure('submitNewClaim.dbInsert',nc,insertResult.error,{as_draft:asDraft,duplicate_of:dupId||''});
        if(dupId&&nc.receiptRefs){
          var attached=await attachReceiptRefsToClaim(dupId,nc.receiptRefs);
          if(attached){
            toast('Duplicate blocked: attached receipt(s) to '+dupId);
            await openClaimById(dupId,'empList');
            return;
          }
        }
        toast(dupId?('Duplicate blocked: '+dupId+' already exists. Please edit the existing claim.'):dbDuplicateClaimMessage(null));
        if(dupId)await openClaimById(dupId,'empList');
        return;
      }
      await logClaimSubmitFailure('submitNewClaim.dbInsert',nc,insertResult.error,{as_draft:asDraft});
      toast(claimInsertFailureMessage(nc,insertResult.error,'Failed to save claim'));
      render();
      return;
    }
    addClaimLocal(nc);
    hydrateClaimAttachmentUrls([nc]).then(function(){if(S==='empList'||S==='claimDetail')render();});
    toast(asDraft?'Draft saved':'Claim '+cid+' submitted!');
    aiResult=null;aiError='';newClaimStep='manual';
    ss('empList','empHome');
    refreshClaimsInBackground();
  }catch(e){
    console.error(e);
    await logFrontendError('error','submitNewClaim.exception',e&&e.message?e.message:'Claim submit failed',{as_draft:asDraft,error:serializeErrorForLog(e)});
    claimSubmitBusy=false;
    toast(e&&e.message?e.message:'Claim submit failed');
    render();
  }
}

    if(pendingFiles.length){
      var receiptRefs='';
      try{receiptRefs=await uploadAllFiles(cid,{category:cv,unit:uv,desc:dv,date:dtv});}catch(e){console.error(e);await logClaimSubmitFailure('submitMgrClaim.receiptUpload',nc,e,{is_company:isCompany});toast(e&&e.message?e.message:'Receipt upload failed');mgrSubmitBusy=false;render();return;}
      if(!receiptRefs){toast('Receipt upload failed');mgrSubmitBusy=false;render();return;}
      nc.receiptRefs=receiptRefs;
    }
    var insertResult=await dbInsertClaim(nc);
    mgrSubmitBusy=false;
    if(!insertResult.ok){
      if(isClaimsDupCheckError(insertResult.error)){
        var dupExact=activeClaimDbDuplicate(nc.emp,nc.date,nc.amount,nc.desc);
        var dupId=(dupExact&&dupExact.id)?dupExact.id:await findDbExactDuplicateClaimId(nc);
        await logClaimSubmitFailure('submitMgrClaim.dbInsert',nc,insertResult.error,{is_company:isCompany,duplicate_of:dupId||''});
        if(dupId&&nc.receiptRefs){
          var attached=await attachReceiptRefsToClaim(dupId,nc.receiptRefs);
          if(attached){
            toast('Duplicate blocked: attached receipt(s) to '+dupId);
            await openClaimById(dupId,'adminDash');
            return;
          }
        }
        toast(dupId?('Duplicate blocked: '+dupId+' already exists. Please edit the existing claim.'):dbDuplicateClaimMessage(null));
        if(dupId)await openClaimById(dupId,'adminDash');
        return;
      }

      toast(claimInsertFailureMessage(nc,insertResult.error,'Failed to save expense'));

      return;
    }

    hydrateClaimAttachmentUrls([nc]).then(function(){if(S==='adminDash'||S==='adminList'||S==='adminHistory')render();});
    toast(isCompany?'Recorded as Company-Paid':'Auto-approved for '+mgrFormEmp);
    aiResult=null;mgrFormPayType='employee';mgrFormEmp=myName();ss(isCompany?'adminHistory':'adminList','adminDash');
    refreshClaimsInBackground();
  }catch(e){
    console.error(e);
    await logFrontendError('error','submitMgrClaim.exception',e&&e.message?e.message:'Expense submit failed',{pay_type:mgrFormPayType,error:serializeErrorForLog(e)});
    mgrSubmitBusy=false;
    toast(e&&e.message?e.message:'Expense submit failed');
    render();
  }
}

async function exportReportPDF(){
  if(!rptUnit||!rptMonth||!rptYear){toast('Missing unit or period');return;}
  var jsPDFLib=window.jspdf&&window.jspdf.jsPDF?window.jspdf.jsPDF:null;
  if(!jsPDFLib){toast('PDF library not loaded');return;}
  var APPROVED_STATUSES=['Approved','Claimed','Auto-Approved','Company-Paid'];
  var ym=rptYear+'-'+rptMonth;
  var rptAliases=reportUnitAliases(rptUnit);
  var rcAll=claims.filter(function(c){return rptAliases.indexOf(c.unit)>=0&&APPROVED_STATUSES.indexOf(c.status)>=0&&(c.expMonth||c.date.slice(0,7))===ym;});
  var rc=rcAll.filter(function(c){return c.unit===rptUnit;});
  var shared=rc.filter(function(c){return reportChargeBucket(c.unit,c.chargedTo)==='Both';});
  var ownerCl=rc.filter(function(c){return reportChargeBucket(c.unit,c.chargedTo)==='Owner';});
  var cfg=unitConfig.filter(function(x){return x.unit_name===rptUnit;})[0]||{};
  var ownerName=cfg.owner_name||'—';
  var monthLabel=MONTHS[rptMonth]+' '+rptYear;
  try{
    var doc=new jsPDFLib({orientation:'p',unit:'mm',format:'a4'});
    var x=12,y=16,pw=186,rCol=x+pw,pageBottom=282;
    function money(v){return 'RM '+(Number(v)||0).toFixed(2);}
    function dmy(v){if(!v)return'--';var d=String(v).slice(0,10);return d.length===10?d.slice(8,10)+' '+(MONTHS[d.slice(5,7)]||d.slice(5,7))+' '+d.slice(0,4):String(v);}
    function addPageIfNeeded(h){if(y+h>pageBottom){doc.addPage();y=16;}}
    function line(){doc.setDrawColor(210,210,210);doc.setLineWidth(0.3);doc.line(x,y,x+pw,y);y+=5;}
    function right(text,xx,yy){doc.text(text,xx-doc.getTextWidth(text),yy);}
    function section(title){
      addPageIfNeeded(12);
      doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(17,24,39);
      doc.text(title,x,y);y+=4;
      doc.setDrawColor(230,230,230);doc.line(x,y,x+pw,y);y+=5;
    }
    function row(label,value,bold){
      addPageIfNeeded(6);
      doc.setFontSize(9);doc.setFont(undefined,bold?'bold':'normal');doc.setTextColor(55,65,81);
      doc.text(label,x,y);right(value,rCol,y);y+=5;
    }
    function tableHeader(cols){
      addPageIfNeeded(10);
      doc.setFillColor(243,244,246);doc.rect(x,y-4,pw,7,'F');
      doc.setFontSize(7.4);doc.setFont(undefined,'bold');doc.setTextColor(55,65,81);
      cols.forEach(function(c){doc.text(c.t,x+c.x,y);});
      y+=5;
    }
    function reportTitle(){
      var hp=UNITS_DATA.filter(function(u){return u.source==='hostplatform'&&unitDisplayName(u)===rptUnit;})[0]||null;
      if(hp)return ((hp.property_name||'').trim()+' '+(hp.mapped_unit_name||hp.name||rptUnit)).trim();
      return rptUnit;
    }
    var title=reportTitle();
    var pdfHpIds=hpIdsForDisplayUnit(rptUnit);
    var pdfRes=reservations.filter(function(r){if(!r.end_date||!r.unit_name)return false;if(r.booking_type===6)return false;if(r.booking_status&&r.booking_status.indexOf('Cancel')>=0)return false;var unitMatch=rptAliases.indexOf(r.unit_name)>=0||(r.hp_unit_id&&pdfHpIds.indexOf(r.hp_unit_id)>=0);return unitMatch&&r.end_date.slice(0,7)===ym;});
    pdfRes.sort(function(a,b){return String(a.end_date||'').localeCompare(String(b.end_date||''));});
    var bkCount=pdfRes.length;
    var bkRev=pdfRes.reduce(function(s,r){return s+parseFloat(r.rental||0)+parseFloat(r.extra_guest||0);},0);
    var cleaningRate=(parseFloat(cfg.cleaning_fee||0)+parseFloat(cfg.laundry_fee||0));
    var cleaningTotal=bkCount*cleaningRate;
    var profitPct=parseFloat(cfg.service_fee_pct||0)||0;
    var sharedTotal=shared.reduce(function(s,c){return s+c.amount;},0);
    var subtotalExpenses=sharedTotal+cleaningTotal;
    var homestayProfit=bkRev-subtotalExpenses;
    var managementFee=homestayProfit*profitPct/100;
    var ownerExpenseTotal=ownerCl.reduce(function(s,c){return s+c.amount;},0);
    var ownerExpensesTotal=ownerExpenseTotal;
    var ownerProfit=homestayProfit-managementFee-ownerExpensesTotal;

    doc.setFontSize(17);doc.setFont(undefined,'bold');doc.setTextColor(0,0,0);
    doc.text(title,x,y);y+=7;
    doc.setFontSize(9);doc.setFont(undefined,'normal');doc.setTextColor(80,80,80);
    doc.text('Owner: '+ownerName,x,y);doc.text('Period: '+monthLabel,x+82,y);y+=6;
    line();

    section('Booking Details');
    tableHeader([{t:'Guest',x:2},{t:'Check-in',x:70},{t:'Check-out',x:102},{t:'Nights',x:134},{t:'Total',x:172}]);
    doc.setFont(undefined,'normal');doc.setFontSize(7.4);doc.setTextColor(45,45,45);
    if(!pdfRes.length){doc.text('No booking records for this unit/month',x+2,y);y+=6;}
    pdfRes.forEach(function(r){
      addPageIfNeeded(8);
      var rental=parseFloat(r.rental||0),extra=parseFloat(r.extra_guest||0),total=rental+extra;
      var guest=doc.splitTextToSize(String(r.guest_name||'Guest'),48)[0]||'Guest';
      doc.text(guest,x+2,y);
      doc.text(dmy(r.start_date),x+70,y);
      doc.text(dmy(r.end_date),x+102,y);
      doc.text(String(r.nights||0),x+138,y);
      right(money(total),rCol,y);
      y+=5;
    });
    row('Sales',money(bkRev),true);y+=2;

    section('Expenses Details');
    var expenseRows=shared.slice();
    if(cleaningTotal>0)expenseRows.push({category:'Cleaning fee',amount:cleaningTotal});
    expenseRows.sort(function(a,b){return String(a.category||'').localeCompare(String(b.category||''));});
    var expenseCats={};expenseRows.forEach(function(c){if(!expenseCats[c.category])expenseCats[c.category]=0;expenseCats[c.category]+=c.amount;});
    tableHeader([{t:'Category',x:2},{t:'Amount',x:168}]);
    doc.setFont(undefined,'normal');doc.setFontSize(7.4);doc.setTextColor(45,45,45);
    if(!expenseRows.length){doc.text('No owner/shared expenses for this unit/month',x+2,y);y+=6;}
    Object.entries(expenseCats).forEach(function(e){
      addPageIfNeeded(8);
      doc.text(doc.splitTextToSize(e[0]||'',130)[0]||'',x+2,y);
      right(money(e[1]),rCol,y);
      y+=5;
    });
    row('Expenses',money(subtotalExpenses),true);
    row('Homestay Profit',money(homestayProfit),true);y+=2;

    section('Homestay Management Fee');
    row('Homestay Management Fee',money(managementFee),true);y+=2;

    section('Owner Expenses');
    var ownerCats={};ownerCl.forEach(function(c){if(!ownerCats[c.category])ownerCats[c.category]=0;ownerCats[c.category]+=c.amount;});
    Object.entries(ownerCats).forEach(function(e){row(e[0],money(e[1]),false);});
    row('Total Owner Expenses',money(ownerExpensesTotal),true);
    y+=2;

    section('Owner');
    row('Owner',ownerName,false);
    row('Homestay Profit',money(homestayProfit),false);
    row('Less: Homestay Management Fee',money(managementFee),false);
    row('Less: Owner Expenses',money(ownerExpensesTotal),false);
    doc.setDrawColor(0);doc.setLineWidth(0.5);doc.line(x,y,x+pw,y);y+=6;
    doc.setFontSize(12);doc.setFont(undefined,'bold');doc.setTextColor(0,0,0);
    doc.text('Owner Profit',x,y);right(money(ownerProfit),rCol,y);y+=10;

    if(y>pageBottom-8){doc.addPage();y=16;}
    doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(150,150,150);
    doc.text('Generated: '+new Date().toLocaleDateString('en-MY')+' - Homestay Expense System',x,y);
    doc.save(title.replace(/[^\w]+/g,'_')+'_'+MONTHS[rptMonth]+rptYear+'.pdf');
    toast('PDF exported');
  }catch(e){console.error('PDF export error:',e);toast('Failed to export PDF');}
}

    var msg=e&&e.message?e.message:'Unknown sync error';
    var low=String(msg).toLowerCase();

      msg='Sync function not deployed in this environment (HTTP 404).';

    await logFrontendError('error','sync-units-ui',msg,{endpoint:SUPABASE_URL+'/functions/v1/sync-units'});

  }
  unitSyncing=false;render();
};

    if(editingUnit){
      var ok=await dbUpdateUnit(editingUnit.id,{name:name,property_short:propertyShort});
      if(ok){await loadUnits();await logAdminAction('unit.saved',{unit_id:editingUnit.id,unit_name:name,property_short:propertyShort});toast('Internal unit updated');editingUnit=null;ss('internalUnits','adminUnits');}
      else{unitFormError='Failed to update. Name may already exist.';render();}
    }else{
      var ok=await dbInsertUnit(name,propertyShort);
      if(ok){await loadUnits();await logAdminAction('unit.saved',{unit_name:name,property_short:propertyShort});toast('Internal unit "'+name+'" added');editingUnit=null;ss('internalUnits','adminUnits');}
      else{unitFormError='Failed to add. Name may already exist.';render();}
    }
  }
};
window.mgrScanReceipt=function(mode){
  if(!AI_RECEIPT_SCAN_ENABLED){toast('AI receipt scan is currently disabled. Please submit manually.');return;}
  var camera=mode==='camera';
  openFilePicker('receipt-input',{accept:camera?'image/*':'image/*,.pdf',capture:camera?'environment':''},async function(){
    var inp=document.getElementById('receipt-input');
    if(!inp.files||!inp.files.length)return;
    var f=inp.files[0];
    if(f.name.match(/\.pdf$/i)){
      aiAnalyzing=true;render();
      try{f=await pdfToImageFile(f);}catch(e){aiAnalyzing=false;render();toast('PDF conversion failed: '+e.message);return;}
    }
    pendingFiles=[f];pendingFileNames=[f.name];
    aiAnalyzing=true;render();
    try{
      var currentUnit=document.getElementById('f-unit');
      var selectedUnit=currentUnit?currentUnit.value:'';
      var ai=await analyzeInvoiceFile(f,selectedUnit);
      aiResult=ai;
      aiAnalyzing=false;render();
      // Pre-fill the form fields after render
      setTimeout(function(){
        var d=document.getElementById('f-desc'),a=document.getElementById('f-amount'),dt=document.getElementById('f-date'),c=document.getElementById('f-cat'),u=document.getElementById('f-unit'),em=document.getElementById('f-expmonth');
        if(d)d.value=formatAiDescription(ai);
        if(a)a.value=ai.total||'';
        if(dt&&ai.date)dt.value=ai.date;
        if(c&&ai.category){for(var i=0;i<c.options.length;i++){if(c.options[i].value===ai.category){c.selectedIndex=i;break;}}}
        var unitVal=selectedUnit||(ai.suggested&&ai.suggested.unit)||ai.unit_hint||'';
        if(u&&unitVal){for(var j=0;j<u.options.length;j++){if(u.options[j].value===unitVal){u.selectedIndex=j;break;}}toggleChargeTo(u.value,'f-charge-wrap');}
        var expVal=(ai.suggested&&ai.suggested.expense_month)||ai.expense_month||'';
        if(em&&expVal){for(var k=0;k<em.options.length;k++){if(em.options[k].value===expVal){em.selectedIndex=k;break;}}}
        if(ai.suggested&&ai.suggested.unit_warning)toast(ai.suggested.unit_warning);
        if(ai.duplicate_claims&&ai.duplicate_claims.length){toast(duplicateClaimMessage(ai));}
        else{toast('AI filled: '+ai.summary);}
      },50);
    }catch(e){
      aiAnalyzing=false;render();
      toast('AI scan failed: '+(e.message||'Try again'));
      logFrontendError('error','mgrScanReceipt',e.message||'AI scan failed',{stack:e.stack});
    }
  });
};
window.mgrChangeToReject=async function(){
  var amt=document.getElementById('rv-amt');
  var upd={status:'Rejected',rejectReason:'Decision revised by manager'};
  if(amt&&amt.value)upd.amount=parseFloat(amt.value);
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Rejected');editingId=null;ss('adminList','adminDash');
};
window.mgrChangeToApprove=async function(){
  var cat=document.getElementById('rv-cat'),unit=document.getElementById('rv-unit'),amt=document.getElementById('rv-amt'),chg=document.getElementById('rv-charged');
  var upd={status:'Approved',rejectReason:''};
  if(cat&&cat.value)upd.category=cat.value;if(unit&&unit.value)upd.unit=unit.value;if(amt&&amt.value)upd.amount=parseFloat(amt.value);if(unit&&unit.value==='MP Office')upd.chargedTo='';else if(chg&&chg.value)upd.chargedTo=chg.value;
  await dbUpdateClaim(SEL.id,upd);
  await loadClaims();toast('Changed to Approved');editingId=null;ss('adminList','adminDash');
};
window.openErrorLogs=function(){
  if(!isSystemAdmin){toast('Only admin can access logs');return;}
  if(S!=='errorLogs')errorLogPage=1;
  ss('errorLogs',adminHomeScreen());
  loadErrorLogs();
  loadSyncLogs().then(function(){if(S==='errorLogs')render();});
};
window.nextErrorLogPage=function(){
  if(!errorLogHasMore)return;
  errorLogPage+=1;
  loadErrorLogs();
};
window.prevErrorLogPage=function(){
  if(errorLogPage<=1)return;
  errorLogPage-=1;
  loadErrorLogs();
};
window.toggleInactiveUnits=function(){showInactiveUnits=!showInactiveUnits;render();};
window.resolveErrorLog=async function(id){
  try{await sb.from('error_logs').update({resolved:true}).eq('id',id);errorLogs=errorLogs.map(function(l){if(l.id===id)l.resolved=true;return l;});render();}catch(e){toast('Failed to update');}
};
window.clearResolvedLogs=async function(){
  if(!confirm('Delete all resolved logs?'))return;
  try{await sb.from('error_logs').delete().eq('resolved',true);errorLogs=errorLogs.filter(function(l){return!l.resolved;});render();toast('Resolved logs cleared');}catch(e){toast('Failed to clear');}
};

// ===== INIT: CHECK SESSION =====
function startInit(){
  (async function(){
    try {
      console.log('Initializing app...');
      console.log('Supabase loaded:', typeof supabase !== 'undefined');
      console.log('sb client:', typeof sb !== 'undefined');
      if(canUseLocalPreview()){
        activateLocalPreview();
        render();
        return;
      }
      if(SUPABASE_CONFIG_ERROR){
        throw new Error(SUPABASE_CONFIG_ERROR);
      }
      if(!sb || !sb.auth){
        throw new Error('Supabase client not ready');
      }
      render(); // show auth screen
      console.log('Initial render called');
      var{data:{session}}=await sb.auth.getSession();
      console.log('Session check:', session ? 'logged in' : 'no session');
      if(session&&session.user){
        await initSession(session.user);
      }
      sb.auth.onAuthStateChange(async function(event,session){
        if(event==='SIGNED_OUT'){
          currentUser=null;currentProfile=null;R=null;S='auth';claims=[];render();
        }
      });
    } catch(e) {
      console.error('Init error:', e.message, e);
      var ms=document.getElementById('ms');
      if(ms){
        ms.innerHTML = '<div style="padding:20px;color:red"><strong>Error:</strong> ' + e.message + '</div>';
      }
    }
  })();
}

// Wait for DOM ready and all scripts to load
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',startInit);
}else{
  startInit();
}
</script>
